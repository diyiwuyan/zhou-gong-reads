标：克服死亡、追求幸福、获得神性","人文主义正在被数据主义取代","算法可能比人类更了解人类自己","自由意志可能只是一种幻觉","大多数人可能在经济和军事上变得无用"],"quotes":["21世纪的议程将是获得神性。","算法比你更了解你自己。","数据主义认为，宇宙由数据流组成。","未来最重要的问题：当算法比我们更了解我们时，我们还有什么价值？"],"lecture":{"essence":"<h2>当人类成为神明</h2><p>《人类简史》讲述了我们从哪里来，《未来简史》则预言我们将去往何处。赫拉利的结论令人不安：<strong>人类正在从「智人」进化为「神人」，但大多数人将在这个过程中变得无关紧要。</strong></p><h3>人类解决了三大古老问题</h3><p>几千年来，人类一直被三个问题折磨：饥荒、瘟疫和战争。今天，这三个问题在历史上第一次不再是人类的主要威胁。</p><p>2016年，全球死于肥胖的人数超过死于饥饿的人数。死于自杀的人数超过死于战争和恐怖主义的总和。这不是说世界完美了，而是说<strong>人类的主要问题已经从「生存」转向了「升级」</strong>。</p><p>下一个议程是什么？赫拉利说：<strong>长生不老、幸福快乐、化身为神。</strong></p><h3>数据主义：新的宗教</h3><p>赫拉利提出了一个惊人的概念：<strong>数据主义</strong>。他认为，数据正在成为21世纪的新宗教。</p><p>数据主义的核心信条是：宇宙由数据流组成，任何现象的价值在于它对数据处理的贡献。人类不过是一种数据处理算法，而且不是最好的那种。</p><p>当算法能比你更了解你自己——你的健康状况、情绪波动、最适合的伴侣、最好的职业选择——你还需要「自由意志」吗？你还需要「自我」吗？</p><h3>算法将取代人类决策</h3><p>赫拉利预言，未来最重要的政治和经济决策将由算法做出，而不是人类。不是因为算法更聪明，而是因为算法能处理更多数据，而且没有情绪偏见。</p><p>这带来了一个根本性的问题：<strong>如果算法比你更了解你，你还有多少自主权？</strong></p><p>今天，Netflix推荐你看什么电影，Spotify决定你听什么音乐，算法决定你在社交媒体上看到什么新闻。这些决定看起来微不足道，但它们正在塑造你的品味、观点和世界观。</p><p>未来，算法可能会决定你应该学什么专业、嫁给谁、住在哪里。不是强制的，而是「建议」——但当算法的建议总是比你自己的选择更好时，你还会坚持自己选择吗？</p><h3>无用阶级的出现</h3><p>工业革命让农民失业，但创造了工厂工人的岗位。AI革命会创造新工作吗？赫拉利持悲观态度。</p><p>工业革命替代的是人类的<strong>体力</strong>，AI革命替代的是人类的<strong>认知能力</strong>。当机器能做任何脑力工作时，人类还剩下什么？</p><p>赫拉利预言，21世纪最大的社会问题不是剥削，而是<strong>无关紧要</strong>。被剥削的人至少还有价值，被认为无关紧要的人连被剥削的资格都没有。</p><p>这将创造一个「无用阶级」——不是因为他们懒惰或愚蠢，而是因为算法在经济上比他们更有效率。</p><h3>人文主义的危机</h3><p>现代世界建立在人文主义的基础上：人类的感受和选择是最高权威，「跟随你的内心」是最高道德准则。</p><p>但如果科学证明「自我」只是大脑中的神经活动，「自由意志」只是一种幻觉，「内心」只是进化塑造的算法——人文主义还站得住脚吗？</p><p>赫拉利没有给出答案，但他提出了三个问题，值得每个人思考：<strong>生物真的只是算法吗？算法能比我更了解我自己吗？当算法比我更了解我时，我应该怎么办？</strong></p>","framework":[{"icon":"🚀","label":"三大议程升级","desc":"人类已基本解决饥荒、瘟疫、战争，下一个议程是长生不老、永恒幸福、化身为神。"},{"icon":"📊","label":"数据主义崛起","desc":"数据正成为新宗教，宇宙被视为数据流，人类不过是一种数据处理算法，且不是最优的。"},{"icon":"🤖","label":"算法决策时代","desc":"当算法比你更了解你自己，自由意志和自主权将面临根本性挑战。"},{"icon":"👥","label":"无用阶级","desc":"AI替代认知能力，将创造大量「无关紧要」的人——不是被剥削，而是被忽视。"},{"icon":"❓","label":"人文主义危机","desc":"如果自我是幻觉、自由意志不存在，「跟随内心」的人文主义基础将彻底动摇。"}],"actions":["记录一周内算法为你做的决策（推荐、导航、搜索结果），思考这些决策如何塑造了你的认知。","练习「逆算法」决策：偶尔刻意选择算法不推荐的书、电影、路线，保持认知多样性。","思考你的工作中哪些部分可以被算法替代，哪些部分是真正「人类独有」的价值。","问自己：如果有一个算法能比你更了解你的健康、情绪和最优选择，你愿意把多少决策权交给它？"]}},{"id":33,"title":"奇点临近","author":"雷·库兹韦尔","category":"science","cover":"singularity-is-near.jpg","rating":8.5,"goodreads":3.99,"pages":652,"year":2005,"tags":["人工智能","技术加速","未来"],"summary":"谷歌工程总监库兹韦尔预测，到2045年，人工智能将超越人类智能，技术进步将进入指数级加速的奇点。他认为人类将与技术融合，实现永生和超级智能。","outline":["加速回报定律：技术的指数增长","生物技术革命","纳米技术革命","人工智能的崛起","奇点：人类与技术的融合"],"keyPoints":["加速回报定律：技术进步是指数级的，而非线性的","到2029年，AI将通过图灵测试","到2045年，奇点到来：AI超越人类智能","纳米技术将彻底改变医疗和制造业","人类将与技术融合，实现意识上传"],"quotes":["奇点不是一个事件，而是一个过程。","技术进步是指数级的，而我们的直觉是线性的。","到2045年，一美元的计算能力将超过所有人类大脑的总和。","死亡是一个需要解决的工程问题。"],"lecture":{"essence":"<h2>当机器超越人类智能的那一天</h2><p>2005年，谷歌工程总监雷·库兹韦尔出版了《奇点临近》，预言了一个令人震撼的未来：<strong>到2045年，人工智能将超越人类智能，人类文明将发生根本性的转变——这个转变点，他称之为「奇点」。</strong></p><p>库兹韦尔不是科幻作家，他是一位有着惊人预测记录的发明家和未来学家。他在1990年预测互联网将在1990年代末爆发，在1999年预测计算机将在2000年代击败国际象棋世界冠军，在2005年预测语音识别将在2010年代成熟。这些预测大多准确实现。</p><h3>指数增长的力量</h3><p>库兹韦尔的核心论点建立在一个观察上：<strong>技术进步是指数级的，而人类的直觉是线性的。</strong></p><p>摩尔定律告诉我们，计算机芯片的性能每两年翻一番。这意味着：从1971年到2005年，计算机性能提升了约10亿倍。从2005年到2045年，按同样的速度，还会再提升约10亿倍。</p><p>人类大脑的计算能力大约是10^16次运算/秒。按照库兹韦尔的预测，到2029年，1000美元的计算机将达到人脑的计算能力；到2045年，全人类大脑的总计算能力将被一台计算机超越。</p><p>这不是线性外推，而是指数曲线。当你站在指数曲线的早期，增长看起来很慢；但当你越过某个临界点，增长会突然变得令人窒息。</p><h3>GNR革命：三波技术浪潮</h3><p>库兹韦尔预言，奇点将由三波技术革命推动：</p><p><strong>G——基因技术（Genetics）</strong>：我们正在学会重写生命的代码。CRISPR基因编辑技术让我们可以修改任何生物的DNA，包括人类。未来，遗传疾病将被消灭，人类寿命将大幅延长，甚至可以设计自己的后代。</p><p><strong>N——纳米技术（Nanotechnology）</strong>：在分子层面操控物质。未来，纳米机器人将在你的血液中巡逻，修复受损细胞，消灭癌细胞，甚至增强大脑功能。库兹韦尔预言，到2030年代，纳米机器人将连接我们的大脑皮层与云端，让人类智能实现指数级扩展。</p><p><strong>R——机器人技术（Robotics）</strong>：这里的「机器人」指的是强人工智能。当AI超越人类智能，它将能够自我改进，创造出更智能的AI，形成「智能爆炸」。</p><h3>奇点之后：人类将变成什么</h3><p>奇点之后，人类将不再是生物意义上的智人。库兹韦尔描绘了一个令人眩晕的未来：</p><p>我们的大脑将与云端AI融合，思维速度和容量将呈指数级增长。我们将能够上传意识，在虚拟世界中生活，甚至实现某种意义上的「永生」。身体将不再是限制，因为纳米机器人可以修复任何损伤，甚至逆转衰老。</p><p>库兹韦尔本人每天服用150种营养补充剂，目标是活到奇点到来的那一天，然后通过技术实现永生。</p><h3>批评与反思</h3><p>《奇点临近》受到了广泛批评。批评者指出：库兹韦尔过于乐观，忽视了技术发展的非线性障碍；意识上传在哲学上是否可能仍是未解之谜；指数增长不可能永远持续，必然会遇到物理极限。</p><p>但无论你是否相信库兹韦尔的具体预测，他提出的核心问题无法回避：<strong>当机器智能超越人类时，我们应该如何准备？什么是人类独有的价值？我们希望成为什么样的存在？</strong></p><p>这些问题，不只是科学家需要回答，每一个活在这个时代的人都需要思考。","framework":[{"icon":"📈","label":"指数增长定律","desc":"技术进步是指数级的，人类直觉是线性的。这个认知差距让大多数人低估了技术变革的速度和规模。"},{"icon":"🧬","label":"GNR三波革命","desc":"基因技术、纳米技术、机器人（AI）三波技术浪潮将共同推动奇点的到来。"},{"icon":"🤖","label":"智能爆炸","desc":"超级AI一旦出现，将能自我改进，创造更智能的AI，形成正反馈循环，智能将以难以想象的速度增长。"},{"icon":"🧠","label":"人机融合","desc":"奇点之后，人类大脑将与云端AI融合，思维能力指数级扩展，生物与技术的边界将消失。"},{"icon":"⚠️","label":"存在性风险","desc":"超级AI带来的不只是机遇，也带来了人类历史上前所未有的存在性风险，需要提前思考对齐问题。"}],"actions":["选择一个你关心的领域，用指数思维预测它10年后的状态，而不是线性外推。","了解CRISPR、大语言模型、纳米技术的最新进展，建立对技术加速的直觉感知。","思考：如果你可以上传意识，你会吗？这个问题背后，你对「自我」的定义是什么？","制定一个「技术适应计划」：未来5年，你需要学习哪些新技能来保持与AI时代的相关性？"]}},{"id":34,"title":"生命是什么","author":"埃尔温·薛定谔","category":"science","cover":"what-is-life.jpg","rating":8.7,"goodreads":4.12,"pages":194,"year":1944,"tags":["生命科学","物理","基因"],"summary":"量子力学奠基人薛定谔从物理学角度探讨生命的本质。他预言了遗传信息的物理载体（后来被证实为DNA），并提出了「负熵「概念，深刻影响了分子生物学的诞生。","outline":["经典物理学的局限","遗传的物理基础","突变：量子跃迁","德尔布吕克模型","生命以负熵为食"],"keyPoints":["生命的遗传信息存储在一种非周期性晶体中（后来被证实为DNA）","生命以负熵为食：通过从环境中获取秩序来维持自身的有序状态","突变是量子跃迁的结果","生命现象需要新的物理定律来解释","意识是物质世界中最神秘的现象"],"quotes":["生命以负熵为食。","生命是物质的一种特殊组织形式。","意识是宇宙中最神秘的现象。","科学的目的是理解自然，而不是控制自然。"],"lecture":{"essence":"<h2>物理学家眼中的生命之谜</h2><p>1944年，量子力学奠基人之一埃尔温·薛定谔在都柏林做了一系列演讲，后来整理成《生命是什么》这本小册子。这本书只有100多页，却被誉为20世纪最重要的科学著作之一，直接启发了沃森和克里克发现DNA双螺旋结构。</p><p>薛定谔问了一个看似简单的问题：<strong>生命是什么？用物理学和化学的语言，我们能解释生命吗？</strong></p><h3>生命对抗熵增</h3><p>热力学第二定律告诉我们，宇宙的总熵（混乱程度）只会增加，不会减少。一杯热水会自然冷却，一个房间会自然变乱，但反过来不会自然发生。</p><p>那么生命是怎么回事？生命体是高度有序的结构，而且能够维持和复制这种有序性。这似乎违反了热力学第二定律。</p><p>薛定谔的解答是：<strong>生命通过从环境中「吸取负熵」来维持自身的有序性。</strong>植物吸收阳光（低熵能量），释放热量（高熵能量）；动物吃食物（低熵物质），排出废物（高熵物质）。生命不是违反热力学，而是通过消耗环境的有序性来维持自身的有序性。</p><p>这个洞见深刻而优美：<strong>生命是一个局部对抗宇宙熵增的过程。</strong>我们活着，就是在用消耗宇宙的代价，维持自己的有序。</p><h3>遗传物质的本质</h3><p>薛定谔在1944年提出了一个惊人的预言：遗传信息必定储存在某种「非周期性晶体」中。</p><p>普通晶体（如食盐）是周期性的，同样的结构不断重复，信息量很低。而遗传物质必须能储存大量信息，所以它必须是「非周期性」的——结构不重复，每个位置都可以携带不同信息。</p><p>九年后，沃森和克里克发现了DNA双螺旋结构。DNA正是薛定谔预言的「非周期性晶体」——四种碱基（A、T、G、C）的不同排列，储存了生命的全部遗传信息。</p><p>一个物理学家，在DNA被发现之前，仅凭物理学原理，就预言了遗传物质的基本性质。这是科学史上最令人叹服的预言之一。</p><h3>量子效应与生命</h3><p>薛定谔还提出，量子力学可能在生命过程中扮演重要角色。基因突变可能是量子跃迁的结果——一个原子从一个位置「跳」到另一个位置，改变了遗传密码。</p><p>这个想法在当时被认为是推测，但今天的量子生物学研究表明，量子效应确实在光合作用、鸟类导航、酶催化等生命过程中发挥作用。生命可能比我们想象的更「量子」。</p><h3>意识的物理基础</h3><p>薛定谔在书的结尾触及了最深的问题：<strong>意识是什么？</strong>他认为，意识不可能用物理学完全解释，因为意识是观察者，而物理学描述的是被观察的世界。</p><p>他提出了一个东方哲学色彩浓厚的观点：也许所有意识都是同一个意识的不同表现，就像海浪都是同一片海洋的不同形态。这个观点与印度吠檀多哲学惊人地相似。</p><p>《生命是什么》的伟大之处，不只在于它的具体预言，更在于它展示了一种思维方式：<strong>用最基本的物理原理，去追问最深刻的生命问题。</strong>这种跨越学科边界的勇气，是所有伟大科学的共同特征。","framework":[{"icon":"🌀","label":"负熵与生命","desc":"生命通过从环境吸取负熵来维持自身有序性，是局部对抗宇宙熵增的过程。"},{"icon":"🧬","label":"非周期性晶体","desc":"薛定谔预言遗传物质是「非周期性晶体」，九年后DNA双螺旋的发现证实了这一预言。"},{"icon":"⚛️","label":"量子与生命","desc":"量子效应可能在基因突变、光合作用等生命过程中发挥关键作用，生命比我们想象的更量子。"},{"icon":"👁️","label":"意识之谜","desc":"意识是观察者，无法被物理学完全解释。薛定谔倾向于认为所有意识是同一意识的不同表现。"},{"icon":"🔬","label":"跨学科思维","desc":"用物理学原理追问生命本质，展示了跨越学科边界的科学勇气，启发了整整一代分子生物学家。"}],"actions":["思考你每天的「负熵」来源：食物、睡眠、学习——你是如何维持自身有序性的？","了解热力学第二定律，用「熵增」的视角理解为什么维持秩序（健康、关系、工作）需要持续投入能量。","读一篇量子生物学的科普文章，了解量子效应在光合作用中的最新发现。","思考薛定谔的意识观：你认为意识是大脑产生的，还是更基本的存在？这个问题如何影响你对自我的理解？"]}},{"id":35,"title":"时间简史","author":"史蒂芬·霍金","category":"science","cover":"brief-history-of-time.jpg","rating":9.0,"goodreads":4.22,"pages":212,"year":1988,"tags":["宇宙","物理","时间"],"summary":"霍金用通俗语言解释了宇宙的起源、时间的本质、黑洞和量子力学。本书将复杂的物理概念带给了普通读者，成为科普史上最畅销的书籍之一，改变了人类对宇宙的认知。","outline":["我们的宇宙图像","空间和时间","膨胀的宇宙","不确定性原理","黑洞与时间箭头"],"keyPoints":["宇宙起源于大爆炸，时间从那一刻开始","时间不是绝对的，它随速度和引力而变化","黑洞不是完全黑的，会发出霍金辐射","不确定性原理：我们无法同时精确知道粒子的位置和速度","宇宙可能是有限但无边界的"],"quotes":["即使我们认为自己知道宇宙是如何运作的，我们也可能是错的。","时间旅行是可能的，但只能向前。","黑洞不是永恒的，它们会蒸发。","如果宇宙没有边界，那么它就不需要创造者。"],"lecture":{"essence":"<h2>宇宙的起源与命运</h2><p>1988年，史蒂芬·霍金出版了《时间简史》，这本书成为有史以来最畅销的科学书籍之一，全球销量超过2500万册。霍金的目标是用普通人能理解的语言，解释宇宙的起源、结构和命运。</p><p>霍金在序言中说，他的编辑警告他：书中每多一个方程式，销量就会减半。所以整本书只有一个方程式：E=mc²。</p><h3>大爆炸：时间的起点</h3><p>宇宙是如何开始的？霍金的答案是：<strong>大约138亿年前，宇宙从一个无限小、无限热、无限密的「奇点」爆炸而来。</strong></p><p>在大爆炸之前，没有时间，没有空间，没有物质。「之前」这个词本身就没有意义，因为时间是随着大爆炸一起诞生的。问「大爆炸之前发生了什么」，就像问「北极点以北是什么」——这个问题本身就是错误的。</p><p>这个结论令人眩晕，但它有坚实的观测证据支持：宇宙正在膨胀（哈勃发现），宇宙微波背景辐射（大爆炸的余晖），以及轻元素的丰度（大爆炸核合成的预测）。</p><h3>黑洞：时空的极限</h3><p>黑洞是霍金最重要的研究领域。黑洞是质量极大的天体，引力强到连光都无法逃脱。</p><p>霍金在1974年做出了一个惊人的发现：<strong>黑洞并不是完全黑的。</strong>由于量子效应，黑洞会缓慢地辐射能量，这被称为「霍金辐射」。这意味着黑洞会逐渐蒸发，最终消失。</p><p>霍金辐射是量子力学和广义相对论的交汇点，是理论物理学最重要的发现之一。它至今尚未被直接观测到（黑洞太远，辐射太弱），但理论上几乎所有物理学家都相信它是正确的。</p><h3>时间箭头：为什么时间只向前流</h3><p>物理学定律大多是时间对称的——如果你把一个物理过程的时间倒放，它仍然符合物理定律。但我们的经验是不对称的：打碎的杯子不会自动复原，年轻人不会变成婴儿，记忆只指向过去。</p><p>为什么时间只向前流？霍金的答案与热力学第二定律有关：<strong>宇宙从低熵（有序）状态开始，向高熵（混乱）状态演化。</strong>时间的方向就是熵增的方向。</p><p>霍金区分了三种时间箭头：热力学箭头（熵增方向）、心理学箭头（记忆指向过去）、宇宙学箭头（宇宙膨胀方向）。他认为这三种箭头是一致的，都指向同一个方向。</p><h3>无边界宇宙：上帝的位置</h3><p>霍金与数学家哈特尔提出了「无边界宇宙」假说：宇宙在时间上没有起点，就像地球表面在空间上没有边界一样。</p><p>在这个模型中，宇宙是自足的，不需要外部的「第一推动力」。霍金说：<strong>「如果宇宙是完全自足的，没有边界或边缘，它就既没有开始也没有结束，它就只是存在。那么，造物主还有什么位置？」</strong></p><p>这不是说上帝不存在，而是说如果宇宙是自足的，就不需要一个外部的创造者来启动它。这是科学与宗教关系的深刻思考。</p><h3>统一理论：物理学的圣杯</h3><p>霍金的终极梦想是找到一个「万物理论」——一个能统一量子力学和广义相对论的理论。量子力学描述微观世界，广义相对论描述宏观宇宙，但这两个理论在数学上是不相容的。</p><p>霍金相信，这样的理论存在，而且一旦找到，它将是「人类理性的终极胜利」——我们将真正理解上帝的心智。</p>","framework":[{"icon":"💥","label":"大爆炸与时间起点","desc":"宇宙从138亿年前的奇点爆炸而来，时间本身随大爆炸诞生，「之前」这个概念没有意义。"},{"icon":"⚫","label":"黑洞与霍金辐射","desc":"黑洞并非完全黑，量子效应使其缓慢辐射能量（霍金辐射），最终蒸发消失。"},{"icon":"⏰","label":"时间箭头","desc":"时间只向前流是因为宇宙从低熵向高熵演化，热力学、心理学、宇宙学三种时间箭头方向一致。"},{"icon":"🌐","label":"无边界宇宙","desc":"宇宙在时间上没有起点，是自足的存在，不需要外部的「第一推动力」或造物主。"},{"icon":"🔮","label":"万物理论","desc":"统一量子力学与广义相对论的「万物理论」是物理学的圣杯，将是人类理性的终极胜利。"}],"actions":["下次仰望星空时，想想你看到的光来自数百万年前，宇宙的尺度让个人烦恼显得多么渺小。","思考「时间箭头」：你的记忆为什么只指向过去？如果时间可以倒流，你的「自我」还存在吗？","了解一个黑洞的基本知识，思考「连光都无法逃脱的引力」意味着什么。","霍金问：如果宇宙是自足的，造物主还有什么位置？你的答案是什么？这个问题如何影响你的世界观？"]}},{"id":36,"title":"自私的基因","author":"理查德·道金斯","category":"science","cover":"selfish-gene.jpg","rating":9.0,"goodreads":4.11,"pages":360,"year":1976,"tags":["进化论","基因","生物学"],"summary":"道金斯提出了基因中心的进化观：自然选择的基本单位是基因，而非个体或物种。生物体只是基因的「生存机器「。他还创造了「模因「（meme）概念，将文化传播类比为基因复制。","outline":["为什么存在人？","复制因子：生命的起源","不朽的双螺旋","基因机器","模因：新的复制因子"],"keyPoints":["自然选择的基本单位是基因，而非个体","生物体是基因的生存机器，为基因的复制服务","利他行为可以用基因自私性来解释（亲缘选择）","模因是文化传播的基本单位，类似于基因","进化没有目的，只有选择压力"],"quotes":["我们是基因的生存机器。","基因是自私的，但这并不意味着生物体也是自私的。","进化没有目的，只有结果。","模因是文化的基因。"],"lecture":{"essence":"<h2>我们都是基因的生存机器</h2><p>1976年，理查德·道金斯出版了《自私的基因》，这本书彻底改变了我们对进化论的理解，也引发了持续至今的争议。道金斯的核心论点只有一句话：<strong>自然选择的基本单位不是个体，不是物种，而是基因。</strong></p><p>我们不是为了自己而活，我们是基因的「生存机器」——基因建造了我们，利用我们来复制自己，然后抛弃我们。</p><h3>基因的视角</h3><p>达尔文的进化论说，适者生存。但「适者」是谁？是个体？是物种？</p><p>道金斯说：<strong>是基因。</strong>基因是进化的真正主角，个体只是基因的临时载体。</p><p>想象一个基因，它让携带它的动物更愿意冒险觅食。这个基因的携带者可能更容易死亡，但如果它找到更多食物，留下更多后代，这个基因就会在种群中扩散。基因「不在乎」个体的死活，它只「在乎」自己的复制。</p><p>这个视角解释了很多用个体选择无法解释的现象，比如亲缘利他主义：为什么动物会为亲属牺牲自己？因为亲属携带相同的基因，帮助亲属就是帮助自己的基因复制。</p><h3>汉密尔顿法则：亲缘选择</h3><p>生物学家汉密尔顿提出了一个优雅的公式：<strong>当rB > C时，利他行为会被自然选择保留。</strong>其中r是亲缘系数，B是受益者的收益，C是施益者的代价。</p><p>你和兄弟姐妹共享50%的基因（r=0.5），和堂兄弟共享12.5%的基因（r=0.125）。如果帮助兄弟的代价是1，收益是3，那么rB=0.5×3=1.5 > C=1，利他行为会被选择。</p><p>遗传学家霍尔丹曾开玩笑说：「我愿意为两个兄弟或八个堂兄弟牺牲生命。」这正是汉密尔顿法则的直觉表达。</p><h3>迷因：文化的基因</h3><p>道金斯在书的最后一章提出了一个影响深远的概念：<strong>迷因（Meme）</strong>。</p><p>如果基因是生物进化的复制子，那么文化进化的复制子是什么？道金斯说是迷因——思想、旋律、时尚、口号，任何可以从一个大脑传播到另一个大脑的信息单元。</p><p>迷因通过模仿传播，经历变异和选择，就像基因一样。成功的迷因不一定对宿主有益，只需要善于传播。宗教、民族主义、流行歌曲——它们都是成功的迷因，因为它们善于在人类大脑中复制自己。</p><p>今天，「meme」（表情包）这个词已经成为互联网文化的核心词汇，但很少有人知道它来自道金斯1976年的这本书。</p><h3>扩展表现型</h3><p>道金斯后来提出了「扩展表现型」的概念：基因的影响不只限于个体的身体，还延伸到个体的行为和环境。</p><p>河狸建造的水坝是河狸基因的「扩展表现型」。寄生虫改变宿主行为（比如弓形虫让老鼠不怕猫）是寄生虫基因的扩展表现型。甚至人类建造的城市，也可以被视为人类基因的扩展表现型。</p><h3>我们能超越基因吗？</h3><p>道金斯的结论并不是悲观的。他说：<strong>「我们是唯一能够反抗自私基因暴政的生物。」</strong></p><p>基因让我们自私，但我们有意识，有文化，有道德。我们可以选择避孕（反抗基因的繁殖命令），可以选择收养（帮助没有基因关联的孩子），可以选择慈善（帮助陌生人）。</p><p>理解基因的自私，不是为了接受它，而是为了超越它。这是道金斯给我们的最重要的礼物。","framework":[{"icon":"🧬","label":"基因中心论","desc":"自然选择的基本单位是基因，个体是基因的临时生存机器，基因的唯一「目标」是复制自己。"},{"icon":"👨‍👩‍👧","label":"亲缘选择","desc":"汉密尔顿法则：当rB>C时利他行为被选择，解释了为什么动物会为亲属牺牲——帮助亲属就是帮助共同的基因。"},{"icon":"💭","label":"迷因理论","desc":"迷因是文化进化的复制子，思想、旋律、时尚通过模仿传播，成功的迷因善于在大脑间复制自己。"},{"icon":"🌊","label":"扩展表现型","desc":"基因影响延伸到个体行为和环境，河狸的水坝、人类的城市都是基因的「扩展表现型」。"},{"icon":"🦅","label":"超越基因","desc":"人类是唯一能反抗基因暴政的生物，意识和文化让我们可以选择超越自私的基因命令。"}],"actions":["下次感到嫉妒或竞争冲动时，问自己：这是我的选择，还是基因在驱动我？","思考你生活中的「迷因」：哪些信念、习惯、价值观是你主动选择的，哪些是被文化「感染」的？","用亲缘选择理论分析你的家庭关系：你对不同亲密程度的亲属的关心程度，是否符合汉密尔顿法则？","道金斯说我们能超越基因。你在哪些方面已经超越了基因的「自私」命令？这让你感觉如何？"]}},{"id":37,"title":"枪炮、病菌与钢铁","author":"贾雷德·戴蒙德","category":"science","cover":"guns-germs-steel.jpg","rating":9.0,"goodreads":4.07,"pages":480,"year":1997,"tags":["历史","地理","文明"],"summary":"戴蒙德回答了一个根本性问题：为什么是欧洲人征服了美洲，而不是反过来？他的答案不是种族优越性，而是地理和环境因素：粮食生产、动物驯化、病菌和技术的传播。","outline":["从伊甸园到卡哈马卡","历史的自然实验","粮食生产的起源","病菌的力量","文字、技术与政治组织"],"keyPoints":["文明的差异来自地理和环境，而非种族","粮食生产是文明发展的基础","动物驯化带来了病菌，也带来了免疫力","大陆的东西走向有利于技术和物种的传播","枪炮、病菌和钢铁是欧洲征服世界的三大武器"],"quotes":["历史的走向由地理决定，而非种族。","病菌杀死的人比枪炮更多。","文明不是某些民族的天赋，而是地理的礼物。","为什么是欧洲人征服了世界？因为他们运气好。"],"lecture":{"essence":"<h2>为什么是欧洲人征服了世界</h2><p>1532年，西班牙征服者皮萨罗带领168名士兵，俘虏了印加帝国皇帝阿塔瓦尔帕，并最终摧毁了一个拥有数百万人口的帝国。这怎么可能？</p><p>贾雷德·戴蒙德在《枪炮、病菌与钢铁》中回答了一个更大的问题：<strong>为什么是欧洲人征服了美洲、非洲和澳大利亚，而不是反过来？</strong></p><p>他的答案令人意外：<strong>不是因为欧洲人更聪明或更勤劳，而是因为地理。</strong></p><h3>终极原因：地理决定论</h3><p>戴蒙德的核心论点是：不同大陆的人类文明发展速度不同，根本原因是地理环境的差异，而不是种族或文化的差异。</p><p>欧亚大陆有几个关键优势：</p><p><strong>可驯化的动植物</strong>：欧亚大陆有最多可驯化的大型哺乳动物（马、牛、猪、羊）和高产谷物（小麦、大麦、水稻）。美洲只有羊驼，澳大利亚几乎没有可驯化的大型动物。</p><p><strong>东西走向的大陆轴线</strong>：欧亚大陆是东西走向的，同一纬度的气候相似，农业技术和物种可以沿纬度快速传播。非洲和美洲是南北走向的，跨越不同气候带，传播困难。</p><p>这两个地理优势，导致欧亚大陆的农业更早发展，人口更密集，技术积累更快。</p><h3>近因：枪炮、病菌与钢铁</h3><p>地理优势最终转化为三种直接的征服工具：</p><p><strong>枪炮（军事技术）</strong>：农业剩余支撑了专业化分工，包括专业的工匠和士兵。欧洲人有钢铁武器、火药和战马，美洲原住民没有。</p><p><strong>病菌（传染病）</strong>：这是最致命的武器，而且是无意识的。欧洲人与牲畜共同生活了数千年，对天花、麻疹、流感等疾病产生了免疫力。美洲原住民从未接触过这些疾病，当欧洲人到来时，传染病杀死了90%的美洲原住民——比枪炮杀死的多得多。</p><p><strong>钢铁（技术）</strong>：不只是武器，还包括船只、工具、书写系统。书写让知识可以积累和传播，这是口头文化无法比拟的优势。</p><h3>为什么中国没有征服世界</h3><p>戴蒙德的理论面临一个挑战：中国在15世纪之前技术上领先欧洲，为什么没有征服世界？</p><p>他的解释是：<strong>政治统一是双刃剑。</strong>中国统一的中央集权政府可以快速推广技术，但也可以快速禁止技术。1433年，中国皇帝禁止了郑和的远洋航行，这个决定无法被推翻。欧洲的分裂反而是优势——哥伦布被葡萄牙拒绝后，找到了西班牙支持。竞争性的多国体系推动了技术创新和探索。</p><h3>对种族主义的反驳</h3><p>戴蒙德写这本书有一个明确的目的：<strong>用科学反驳种族主义。</strong></p><p>种族主义者认为，欧洲人征服世界是因为欧洲人天生更聪明、更有创造力。戴蒙德的回答是：如果你把欧洲婴儿和新几内亚婴儿互换，让他们在对方的环境中成长，结果会完全不同。</p><p>人类的智力在过去5万年里没有显著差异。不同文明的发展差距，完全可以用地理环境来解释，不需要诉诸种族差异。</p>","framework":[{"icon":"🗺️","label":"地理决定论","desc":"文明发展速度的差异根本原因是地理环境，而非种族或文化——这是对种族主义的科学反驳。"},{"icon":"🌾","label":"可驯化物种优势","desc":"欧亚大陆拥有最多可驯化的大型动物和高产谷物，这是农业文明发展的物质基础。"},{"icon":"➡️","label":"大陆轴线效应","desc":"东西走向的欧亚大陆让农业技术沿纬度快速传播，南北走向的美非大陆则传播困难。"},{"icon":"🦠","label":"病菌的力量","desc":"传染病杀死了90%的美洲原住民，比枪炮更致命。欧洲人的免疫力来自与牲畜共同生活的数千年。"},{"icon":"🏛️","label":"政治分裂的优势","desc":"欧洲的多国竞争体系推动了技术创新，中国的政治统一反而可能阻碍了探索和技术扩散。"}],"actions":["思考你出生的地理和社会环境如何塑造了你的机会——哪些成就是你的努力，哪些是「地理红利」？","了解一个你不熟悉的文明（如印加、马雅、班图），用戴蒙德的框架分析它的发展轨迹。","下次遇到「某某民族天生如何」的说法时，用地理和历史环境来重新解释。","思考：在当今世界，「地理决定论」还适用吗？互联网时代，地理优势是否已经被技术抹平？"]}},{"id":38,"title":"上帝掷骰子吗","author":"曹天元","category":"science","cover":"quantum-physics.jpg","rating":9.2,"goodreads":4.35,"pages":464,"year":2006,"tags":["量子力学","物理","科学史"],"summary":"中国作者曹天元用生动的叙事方式讲述了量子力学的诞生和发展史。从普朗克的量子假说到薛定谔的猫，从爱因斯坦与玻尔的世纪之争到量子纠缠，本书让量子力学变得引人入胜。","outline":["黑体辐射：量子的诞生","光的波粒二象性","矩阵力学与波动力学","哥本哈根诠释","爱因斯坦与玻尔的世纪之争"],"keyPoints":["量子力学诞生于解释黑体辐射的困境","光既是波又是粒子，这取决于你如何观测","不确定性原理是量子力学的核心","哥本哈根诠释：观测导致波函数坍缩","量子纠缠：爱因斯坦称之为'鬼魅般的超距作用'"],"quotes":["上帝不掷骰子。——爱因斯坦","别告诉上帝该怎么做。——玻尔","如果你不被量子力学震惊，那你就没有真正理解它。","量子力学是人类最成功的科学理论。"],"lecture":{"essence":"<h2>量子力学的故事与哲学</h2><p>「上帝不掷骰子。」——爱因斯坦</p><p>「爱因斯坦，别告诉上帝该怎么做。」——玻尔</p><p>这场发生在20世纪初的争论，不只是两位天才的个人恩怨，而是关于现实本质的最深刻哲学争论。中国科普作家曹天元的《上帝掷骰子吗》，用生动的叙事带我们走进量子力学的诞生史，以及它引发的哲学风暴。</p><h3>经典物理学的危机</h3><p>19世纪末，物理学家们以为自己已经接近完成了对宇宙的描述。牛顿力学解释了宏观运动，麦克斯韦方程组统一了电磁学，热力学描述了能量转换。物理学大厦似乎已经建成，只剩下一些「小问题」需要解决。</p><p>其中一个「小问题」是黑体辐射——加热的物体发出的光的颜色分布。经典物理学的预测与实验严重不符，甚至预言在紫外线频率下辐射强度会趋向无穷大（「紫外灾难」）。</p><p>1900年，普朗克为了解决这个问题，提出了一个他自己都不相信的假设：能量不是连续的，而是一份一份的，每份能量的大小是hν（h是普朗克常数，ν是频率）。这个假设完美解决了黑体辐射问题，但也打开了潘多拉的盒子。</p><h3>量子力学的核心：不确定性</h3><p>1927年，海森堡提出了「不确定性原理」：<strong>你不可能同时精确知道一个粒子的位置和动量。</strong>你测量得越精确，另一个量就越不确定。这不是测量技术的限制，而是自然界的根本规律。</p><p>这意味着什么？在量子世界里，粒子在被观测之前没有确定的位置，只有「可能在某处」的概率。观测行为本身改变了被观测的对象。</p><p>爱因斯坦无法接受这个结论。他相信「上帝不掷骰子」——宇宙是确定性的，量子力学的不确定性只是我们知识不完整的表现，背后一定有「隐变量」。</p><p>玻尔则认为，不确定性是现实的根本特征，不是知识的缺陷。这场争论持续了几十年，最终实验（贝尔不等式测试）支持了玻尔的立场：量子不确定性是真实的，不是隐变量造成的。</p><h3>薛定谔的猫：量子叠加态</h3><p>为了说明量子力学的荒谬性，薛定谔设计了一个思想实验：把一只猫关在箱子里，箱子里有一个量子装置，如果放射性原子衰变，就会触发机关杀死猫。</p><p>量子力学说，在观测之前，放射性原子处于「衰变」和「未衰变」的叠加态。那么猫呢？它是「死」和「活」的叠加态吗？</p><p>这个思想实验揭示了量子力学的核心悖论：<strong>微观世界的量子叠加态，如何过渡到宏观世界的确定状态？</strong>这个问题至今没有完全令人满意的答案，催生了多种量子力学诠释：哥本哈根诠释、多世界诠释、退相干理论……</p><h3>量子纠缠：「鬼魅般的超距作用」</h3><p>量子纠缠是量子力学最神奇的现象：两个粒子一旦纠缠，无论相距多远，测量其中一个的状态，另一个的状态会瞬间确定，似乎超越了光速。</p><p>爱因斯坦称之为「鬼魅般的超距作用」，认为这证明量子力学是不完整的。但实验证明，量子纠缠是真实的，而且不能用来传递信息（因此不违反相对论）。</p><p>今天，量子纠缠是量子计算和量子通信的基础，中国的「墨子号」卫星已经实现了千公里级的量子纠缠实验。</p>","framework":[{"icon":"🎲","label":"量子不确定性","desc":"海森堡不确定性原理：粒子的位置和动量不能同时精确确定，这是自然界的根本规律，不是测量误差。"},{"icon":"🐱","label":"薛定谔的猫","desc":"量子叠加态的宏观悖论：猫在观测前处于「死活叠加」状态，揭示了量子测量问题的深刻困难。"},{"icon":"🔗","label":"量子纠缠","desc":"纠缠粒子无论相距多远，测量一个会瞬间影响另一个，是量子计算和量子通信的物理基础。"},{"icon":"🌍","label":"哥本哈根诠释","desc":"玻尔的主流诠释：量子不确定性是现实的根本特征，观测行为本身参与创造了现实。"},{"icon":"🌌","label":"多世界诠释","desc":"每次量子测量，宇宙分裂成多个平行世界，每种可能性都在某个世界中实现。"}],"actions":["思考「观测改变现实」的量子原理：在你的生活中，观察一件事是否也会改变它？（比如观察自己的情绪）","了解量子计算的基本原理，思考它将如何改变密码学、药物研发和人工智能。","思考爱因斯坦和玻尔的争论：你更倾向于「宇宙是确定的」还是「不确定性是根本的」？这个选择如何影响你的人生观？","了解中国量子通信卫星「墨子号」的成就，思考量子技术对国家安全和信息安全的影响。"]}},{"id":39,"title":"苏菲的世界","author":"乔斯坦·贾德","category":"philosophy","cover":"sophies-world.jpg","rating":8.9,"goodreads":4.21,"pages":518,"year":1991,"tags":["哲学","启蒙","西方哲学史"],"summary":"以小说形式呈现的西方哲学史入门读物。14岁的苏菲收到神秘信件，开始了一段哲学启蒙之旅。从苏格拉底到萨特，本书用生动的故事让哲学变得亲切可读。","outline":["古希腊哲学：万物的本原","中世纪哲学：信仰与理性","文艺复兴与启蒙运动","近代哲学：笛卡尔到康德","现代哲学：黑格尔到萨特"],"keyPoints":["哲学始于惊奇：对世界的好奇心是哲学的起点","苏格拉底：我只知道我一无所知","柏拉图的理念论：真实世界是理念的影子","笛卡尔：我思故我在","存在主义：存在先于本质，人是自由的"],"quotes":["哲学家是那些永远不会习惯于世界的人。","我只知道我一无所知。——苏格拉底","我思故我在。——笛卡尔","存在先于本质。——萨特"],"lecture":{"essence":"<h2>一部写给所有人的哲学史</h2><p>1991年，挪威作家乔斯坦·贾德出版了《苏菲的世界》，这本书用一个引人入胜的侦探故事，把整个西方哲学史呈现给普通读者。它成为了全球最畅销的哲学入门书，被翻译成60多种语言。</p><p>故事从一个问题开始：<strong>「你是谁？」「世界从何而来？」</strong>14岁的苏菲收到了这两个问题，开始了一段改变她世界观的哲学之旅。</p><h3>哲学的起点：惊奇</h3><p>贾德借哲学导师艾伯特之口说：<strong>「哲学家和孩子有一个共同点——他们对世界感到惊奇。」</strong></p><p>孩子对一切都感到新奇，但随着成长，我们习惯了世界的存在，不再追问「为什么」。哲学家的任务，就是保持这种惊奇感，不断追问那些被我们视为理所当然的事情。</p><p>为什么有东西存在，而不是什么都没有？时间是什么？意识是什么？善恶的标准是什么？这些问题没有简单答案，但追问本身就有价值。</p><h3>古希腊：哲学的诞生</h3><p>西方哲学诞生于公元前6世纪的古希腊。在此之前，人们用神话解释世界——雷电是宙斯的愤怒，地震是波塞冬的震怒。</p><p>第一批哲学家（泰勒斯、阿那克西曼德、赫拉克利特）开始用自然原因解释自然现象。泰勒斯说万物的本原是水，赫拉克利特说是火，德谟克利特说是原子。他们的具体答案不重要，重要的是他们开创了一种新的思维方式：<strong>用理性而非神话来解释世界。</strong></p><p>苏格拉底是哲学史上最重要的人物之一，但他没有留下任何著作。他的方法是「苏格拉底式对话」——通过不断追问，帮助对话者发现自己知识的局限。他的名言：「我唯一知道的，就是我什么都不知道。」</p><h3>柏拉图：理念世界</h3><p>柏拉图是苏格拉底的学生，他提出了「理念论」：我们感知到的世界只是影子，真实的世界是「理念世界」——完美的、永恒的、不变的形式。</p><p>你见过的所有马都是不完美的，但你脑中有「马」的概念，这个概念比任何具体的马都更真实。美丽的事物会消逝，但「美」本身是永恒的。</p><p>柏拉图的「洞穴比喻」是哲学史上最著名的比喻：囚犯被锁在洞穴里，只能看到墙上的影子，以为影子就是现实。哲学家的任务是走出洞穴，看到真实的阳光。</p><h3>笛卡尔：我思故我在</h3><p>17世纪，笛卡尔决定从零开始重建知识体系。他的方法是系统性怀疑：怀疑一切可以怀疑的东西，直到找到不可怀疑的基础。</p><p>他发现，他可以怀疑感官（感官会欺骗我们），可以怀疑数学（也许有恶魔在欺骗我），但有一件事他无法怀疑：<strong>他正在怀疑这件事本身。</strong>怀疑需要一个怀疑者，所以「我」必然存在。</p><p>「我思故我在」（Cogito ergo sum）——这是笛卡尔找到的不可怀疑的基础，也是现代哲学的起点。</p><h3>存在主义：存在先于本质</h3><p>20世纪，萨特提出了存在主义的核心命题：<strong>「存在先于本质。」</strong></p><p>对于一把椅子，本质（设计图）先于存在（制造出来）。但对于人类，我们先存在，然后才定义自己是什么。没有人预先决定你是谁，你通过自己的选择创造自己的本质。</p><p>这是一种令人振奋但也令人焦虑的自由：你完全自由，但也完全负责。你不能把自己的选择归咎于基因、环境或上帝——你就是你的选择。","framework":[{"icon":"❓","label":"哲学的惊奇","desc":"哲学始于对世界的惊奇，哲学家和孩子的共同点是不把世界的存在视为理所当然。"},{"icon":"🏛️","label":"古希腊理性主义","desc":"西方哲学的诞生：用理性而非神话解释世界，苏格拉底的「无知之知」开创了批判性思维传统。"},{"icon":"💡","label":"柏拉图理念论","desc":"感知世界是影子，理念世界才是真实。洞穴比喻：哲学家的任务是走出洞穴，看到真实的阳光。"},{"icon":"🤔","label":"笛卡尔的怀疑","desc":"系统性怀疑一切，直到找到不可怀疑的基础：「我思故我在」——思考本身证明了思考者的存在。"},{"icon":"🗽","label":"存在主义自由","desc":"存在先于本质：人没有预设的本质，通过选择创造自己，完全自由也意味着完全负责。"}],"actions":["今天，对一件你习以为常的事情保持「哲学惊奇」：为什么有意识？为什么有道德？为什么有美？","用苏格拉底式追问检验一个你坚信的观点：不断问「为什么」，直到你找到真正的基础或承认不知道。","思考柏拉图的洞穴比喻：你生活中的「洞穴」是什么？什么样的「阳光」是你还没有看到的？","萨特说你就是你的选择。回顾你过去一年最重要的三个选择，它们如何定义了你是谁？"]}},{"id":40,"title":"道德经","author":"老子","category":"philosophy","cover":"tao-te-ching.jpg","rating":9.3,"goodreads":4.35,"pages":112,"year":-400,"tags":["道家","哲学","智慧"],"summary":"中国古代最伟大的哲学著作之一，仅五千言却包含了深刻的宇宙观、人生观和政治哲学。老子的核心思想：道法自然、无为而治、柔弱胜刚强。两千五百年后依然是全球最多译本的著作之一。","outline":["道：宇宙的本原","德：道的体现","无为：顺应自然","柔弱胜刚强","圣人之治"],"keyPoints":["道可道，非常道：真正的道是无法用语言完全表达的","无为而无不为：顺应自然规律，不强行干预","柔弱胜刚强：水善利万物而不争","知足者富：真正的富足来自内心的满足","损之又损，以至于无为：减少欲望，回归本真"],"quotes":["道可道，非常道。","上善若水。","知足者富。","为学日益，为道日损。"],"lecture":{"essence":"<h2>五千字的宇宙智慧</h2><p>《道德经》只有五千字，却是中国历史上被翻译次数最多的著作，也是除《圣经》外被翻译成最多语言的书籍。老子用极简的语言，触及了宇宙、社会和人生的最深层规律。</p><p>「道可道，非常道。名可名，非常名。」——开篇第一句，就告诉我们：真正的道，是无法用语言完全表达的。这本书的悖论在于，它用语言来描述语言无法描述的东西。</p><h3>道：万物的根源</h3><p>「道」是《道德经》的核心概念，但老子拒绝给它一个明确的定义。道是万物的根源，是宇宙运行的规律，是一切存在的基础。</p><p>「道生一，一生二，二生三，三生万物。」道是最初的统一，分化为阴阳，再分化为万物。这不只是宇宙论，也是一种思维方式：在复杂的表象背后，寻找统一的根源。</p><p>道的特征是「无为」——不是什么都不做，而是顺应自然规律，不强行干预。水是道的最好比喻：水往低处流，不争不抢，却能穿透最坚硬的岩石。「天下莫柔弱于水，而攻坚强者莫之能胜。」</p><h3>无为而治：最高的领导力</h3><p>老子的政治哲学是「无为而治」：最好的统治者，人民几乎感觉不到他的存在。「太上，不知有之；其次，亲而誉之；其次，畏之；其次，侮之。」</p><p>这与现代管理学的「赋能型领导」惊人地相似：最好的领导者不是事必躬亲，而是创造条件让团队自主运作。当一切顺利时，人们说「我们自己做到的」，而不是「领导带领我们做到的」。</p><p>「为学日益，为道日损。损之又损，以至于无为。无为而无不为。」学习知识是不断积累，修道是不断减少——减少执念、减少干预、减少自我，最终达到「无为而无不为」的境界。</p><h3>反者道之动：辩证法的智慧</h3><p>「反者道之动，弱者道之用。」道的运动方式是向相反方向转化，道的作用方式是以柔弱胜刚强。</p><p>这是老子最深刻的洞见之一：事物发展到极端，必然向相反方向转化。「祸兮福之所倚，福兮祸之所伏。」「曲则全，枉则直，洼则盈，弊则新。」</p><p>这种辩证思维在现代生活中处处适用：过度追求成功可能导致失败，过度控制可能导致失控，过度保护可能导致脆弱。</p><h3>知足常乐：欲望的管理</h3><p>「知足者富。」「知足常乐。」老子对欲望的态度不是禁欲，而是「知足」——了解自己真正需要什么，不被无止境的欲望驱动。</p><p>「为腹不为目」——满足基本需求，而不是追求感官刺激。这与现代心理学的研究一致：超过基本需求之后，更多的财富和地位并不能带来更多幸福。</p><p>「胜人者有力，自胜者强。」战胜别人需要力量，战胜自己才是真正的强大。这是老子对「强」的重新定义：不是外在的征服，而是内在的自我超越。</p><h3>道德经的现代意义</h3><p>《道德经》写于2500年前，但它的智慧在今天依然鲜活。在一个追求速度、效率、控制的时代，老子提醒我们：<strong>有时候，少即是多；退一步，海阔天空；顺应自然，比强行干预更有力量。</strong></p>","framework":[{"icon":"☯️","label":"道的本质","desc":"道是万物根源，无法用语言完全定义。水是道的最好比喻：柔弱却能穿透最坚硬的岩石。"},{"icon":"🌊","label":"无为而治","desc":"最好的领导者让人感觉不到他的存在，创造条件让团队自主运作，这是最高形式的领导力。"},{"icon":"🔄","label":"反者道之动","desc":"事物发展到极端必然向相反方向转化：祸福相依，曲则全，弱者道之用。"},{"icon":"😌","label":"知足常乐","desc":"知足不是放弃，而是了解真正的需求，不被无止境的欲望驱动，这是内在富足的来源。"},{"icon":"💪","label":"自胜者强","desc":"战胜别人需要力量，战胜自己才是真正的强大。强的真正定义是内在的自我超越。"}],"actions":["今天，在一件事上练习「无为」：不要强行干预，观察事情自然发展的结果。","找出你生活中一个「过度」的地方（过度工作、过度控制、过度追求），思考如何「损之又损」。","用「反者道之动」分析你当前面临的一个困境：它的反面是什么？转机可能在哪里？","写下你真正「需要」的东西（为腹）和你「想要」的东西（为目），思考两者的差距。"]}},{"id":41,"title":"沉思录","author":"马可·奥勒留","category":"philosophy","cover":"meditations.jpg","rating":9.1,"goodreads":4.28,"pages":254,"year":180,"tags":["斯多葛","哲学","自我修炼"],"summary":"罗马皇帝马可·奥勒留写给自己的私人日记，记录了他对斯多葛哲学的思考和实践。本书没有系统的论述，只有真诚的自我反省和对美好生活的追求，两千年后依然感动无数读者。","outline":["感恩与学习","理性与自然","美德与责任","死亡与无常","内心的宁静"],"keyPoints":["斯多葛哲学：区分可控与不可控，专注于可控的事","美德是唯一真正的善，其他都是无关紧要的","死亡是自然的一部分，不应恐惧","每天都可能是最后一天，要充分活在当下","内心的宁静来自于与自然和理性的和谐"],"quotes":["你有权控制你的思想，而不是外部事件。认识到这一点，你将找到力量。","浪费时间是最大的浪费，因为时间是我们最宝贵的资源。","障碍即道路。","你今天的行为，就是你明天的命运。"],"lecture":{"essence":"<h2>一位皇帝写给自己的哲学日记</h2><p>《沉思录》是罗马皇帝马可·奥勒留写给自己的私人日记，从未打算出版。他在位期间，罗马帝国面临瘟疫、战争和内乱，他在战场上、在行军途中，用希腊语写下这些思考。</p><p>这本书没有系统的论证，没有华丽的文字，只有一个人对自己的诚实审视和不断提醒。它是斯多葛哲学最纯粹的表达，也是人类历史上最伟大的自我修炼记录之一。</p><h3>斯多葛哲学的核心：区分能控制的和不能控制的</h3><p>斯多葛哲学的基础是一个简单但深刻的区分：<strong>有些事情在我们的控制之内，有些事情不在我们的控制之内。</strong></p><p>在我们控制之内的：我们的判断、欲望、厌恶、行动。不在我们控制之内的：身体、财富、名誉、权力、他人的行为、死亡。</p><p>马可·奥勒留反复提醒自己：不要为不在控制之内的事情烦恼，把全部精力放在控制之内的事情上。「你有权力控制你的心智，而不是外部事件。认识到这一点，你将找到力量。」</p><h3>此刻即是全部</h3><p>马可·奥勒留深受斯多葛时间观的影响：<strong>过去已经过去，未来尚未到来，只有此刻是真实的。</strong></p><p>「把每一天都当作可能是最后一天来过，但不是绝望地，而是充满感激地。」这不是消极的末日思维，而是一种珍惜当下的积极态度。</p><p>他还提醒自己：「你失去的只是此刻，因为你只拥有此刻。」过去的痛苦已经过去，未来的恐惧尚未到来，此刻的烦恼往往比我们想象的小得多。</p><h3>对他人的宽容</h3><p>马可·奥勒留是一位皇帝，每天要处理无数令人沮丧的人和事。他如何保持内心平静？</p><p>他的方法是理解：<strong>「当你早上起床时，告诉自己：今天我将遇到爱管闲事的人、忘恩负义的人、傲慢的人、欺骗的人、嫉妒的人和不合群的人。但我受到了影响，因为我无法想象一个没有这些人的世界。」</strong></p><p>他不是假装这些人不令人烦恼，而是提前接受他们的存在，然后选择不被他们影响。这是一种主动的宽容，而不是被动的忍受。</p><h3>美德即幸福</h3><p>斯多葛哲学认为，真正的幸福不依赖于外部条件，而依赖于内在的美德。财富、健康、名誉都是「优先的无关紧要之物」——有了更好，没有也无妨，但它们不是幸福的来源。</p><p>马可·奥勒留写道：「如果它不是道德上的错误，就不要让它困扰你。」很多让我们烦恼的事情，既不是道德问题，也不在我们的控制之内，我们为什么要让它们占据我们的心智？</p><h3>死亡的沉思</h3><p>马可·奥勒留经常思考死亡，不是为了恐惧，而是为了获得视角。「亚历山大大帝和他的马夫死后都在同一个地方。」「凯撒和他的厨师，都已化为尘土。」</p><p>这种「死亡冥想」（memento mori）不是悲观，而是一种解放：当你意识到一切都会消逝，眼前的烦恼就显得微不足道，真正重要的事情就变得清晰。","framework":[{"icon":"⚖️","label":"控制二分法","desc":"斯多葛核心：区分能控制的（判断、行动）和不能控制的（外部事件、他人），只为前者负责。"},{"icon":"⏰","label":"活在当下","desc":"过去已过去，未来未到来，只有此刻是真实的。把每天当作可能的最后一天，充满感激地过。"},{"icon":"🤝","label":"主动宽容","desc":"提前接受人性的弱点，选择不被他人的行为影响，这是主动的宽容而非被动的忍受。"},{"icon":"🌟","label":"美德即幸福","desc":"真正的幸福来自内在美德，而非外部条件。财富健康名誉是「优先的无关紧要之物」。"},{"icon":"💀","label":"死亡冥想","desc":"经常思考死亡不是悲观，而是获得视角的工具：一切都会消逝，眼前烦恼就显得微不足道。"}],"actions":["今天，列出三件让你烦恼的事，判断它们是否在你的控制之内。对于不在控制之内的，练习放下。","早上起床时，用马可·奥勒留的方式预设今天会遇到的困难，然后决定你的应对态度。","做一次「死亡冥想」：想象自己在生命终点回望今天，哪些烦恼会显得微不足道？哪些事情才真正重要？","找出你生活中一个「不是道德错误但让你烦恼」的事情，练习不让它占据你的心智。"]}},{"id":42,"title":"活出生命的意义","author":"维克多·弗兰克尔","category":"philosophy","cover":"mans-search-for-meaning.jpg","rating":9.3,"goodreads":4.37,"pages":165,"year":1946,"tags":["意义","存在主义","心理学"],"summary":"奥地利心理学家弗兰克尔在纳粹集中营的亲身经历，以及由此发展出的意义疗法。他发现，即使在最极端的苦难中，人仍然可以选择自己的态度，找到生命的意义。","outline":["集中营的经历","意义疗法","存在的空虚","意义的三种来源","悲剧性乐观主义"],"keyPoints":["在刺激和反应之间，人有选择的自由","生命的意义可以通过三种方式找到：创造、体验和苦难","存在的空虚是现代人的主要心理问题","意义不是被发现的，而是被创造的","悲剧性乐观主义：在苦难中找到意义"],"quotes":["在刺激和反应之间，有一个空间。在那个空间里，有我们选择回应的力量。","生命在任何条件下都有意义，即使是在最悲惨的条件下。","人可以被剥夺一切，除了一件事：在任何情况下选择自己态度的自由。","爱是人类能够渴望的最终和最高目标。"],"lecture":{"essence":"<h2>在最黑暗的地方寻找光</h2><p>维克多·弗兰克尔是奥地利精神病学家，纳粹时期被关押在奥斯维辛等集中营。他失去了父母、妻子和兄弟，经历了人类历史上最残酷的苦难。但他活了下来，并写下了《活出生命的意义》——这本书成为了20世纪最重要的心理学著作之一，全球销量超过1600万册。</p><p>弗兰克尔的核心发现：<strong>即使在最极端的苦难中，人仍然拥有一种自由——选择自己对苦难的态度的自由。</strong></p><h3>意义疗法：人的首要动机是寻找意义</h3><p>弗兰克尔创立了「意义疗法」（Logotherapy），与弗洛伊德的「快乐原则」和阿德勒的「权力意志」不同，他认为人的首要动机是<strong>寻找生命的意义</strong>。</p><p>在集中营里，弗兰克尔观察到：那些能够活下来的人，往往是那些找到了活下去的理由的人。不是最强壮的，不是最年轻的，而是那些心中有「为什么」的人。</p><p>尼采说：「知道为什么而活的人，几乎能承受任何怎样活的问题。」弗兰克尔用自己的经历证明了这句话。</p><h3>集中营的心理学观察</h3><p>弗兰克尔在集中营里没有停止观察和思考。他发现，囚犯的心理反应经历三个阶段：</p><p><strong>第一阶段：震惊</strong>。刚进入集中营时，人们处于震惊状态，无法相信眼前的现实。</p><p><strong>第二阶段：冷漠</strong>。为了保护自己，人们变得麻木，对痛苦和死亡失去感觉。这是一种心理防御机制。</p><p><strong>第三阶段：解放后的幻灭</strong>。获救后，人们发现自己无法立刻感到快乐，需要时间重新学习感受。</p><p>弗兰克尔还观察到，那些失去意义感的人往往最先崩溃。他看到一个囚犯梦见战争会在某月某日结束，当那一天到来而战争没有结束时，这个人在几天内就死去了——不是因为身体原因，而是因为希望破灭。</p><h3>意义的三个来源</h3><p>弗兰克尔认为，人可以从三个途径发现生命的意义：</p><p><strong>创造或工作</strong>：通过做有价值的事情找到意义。不一定是伟大的事业，任何真诚投入的工作都可以成为意义的来源。</p><p><strong>体验或爱</strong>：通过体验美好的事物（自然、艺术、真理）或爱一个人找到意义。弗兰克尔在集中营里，通过在脑海中与妻子对话，找到了支撑自己的力量。</p><p><strong>苦难的态度</strong>：当我们无法改变苦难时，我们仍然可以选择如何面对它。这是人类最后的自由。弗兰克尔说：「在刺激和反应之间，有一个空间。在那个空间里，是我们选择反应的力量。在我们的反应里，是我们的成长和自由。」</p><h3>存在的空虚与意义的追寻</h3><p>弗兰克尔预言，20世纪最大的心理问题不是神经症，而是「存在的空虚」——人们感到生命没有意义，不知道自己想要什么，只是随波逐流。</p><p>这个预言在今天显得格外准确。物质丰富的时代，抑郁症和焦虑症的发病率反而上升。人们有了更多选择，却更难找到方向。</p><p>弗兰克尔的答案是：<strong>意义不是被发现的，而是被创造的。</strong>不要问生命的意义是什么，而要问你能为生命贡献什么。生命在向你提问，你的行动就是你的回答。","framework":[{"icon":"🕯️","label":"最后的自由","desc":"即使在最极端的苦难中，人仍拥有选择自己对苦难态度的自由——这是任何人都无法剥夺的。"},{"icon":"🎯","label":"意义是首要动机","desc":"人的首要动机不是快乐或权力，而是寻找生命的意义。有「为什么」的人能承受任何「怎样」。"},{"icon":"💡","label":"意义的三个来源","desc":"创造与工作、体验与爱、对苦难的态度——这三个途径都可以成为生命意义的来源。"},{"icon":"😶","label":"存在的空虚","desc":"现代社会最大的心理问题是感到生命没有意义，物质丰富反而加剧了这种空虚感。"},{"icon":"🌱","label":"意义被创造","desc":"意义不是被发现的，而是被创造的。不问生命的意义是什么，而问你能为生命贡献什么。"}],"actions":["写下你生命中三件让你感到有意义的事情，分析它们属于弗兰克尔的哪个意义来源。","思考你当前面临的一个困境：你无法改变它，但你可以选择什么样的态度？","弗兰克尔说「刺激和反应之间有一个空间」。今天，在一个让你烦躁的情境中，刻意暂停，在那个空间里做出选择。","问自己：如果生命在向你提问，你的行动是什么样的回答？你满意这个回答吗？"]}},{"id":43,"title":"论语","author":"孔子","category":"philosophy","cover":"analects.jpg","rating":9.2,"goodreads":4.08,"pages":368,"year":-479,"tags":["儒家","哲学","道德"],"summary":"儒家思想的核心经典，记录了孔子及其弟子的言行。仁、义、礼、智、信是儒家的核心价值观。两千五百年来，论语深刻影响了中国乃至东亚的文化、教育和政治。","outline":["仁：爱人的核心","礼：社会秩序的基础","君子：理想人格","学习与修身","政治与治国"],"keyPoints":["仁是儒家思想的核心：爱人、克己复礼","君子是儒家的理想人格：仁义礼智信","学而时习之：学习需要不断温习和实践","己所不欲，勿施于人：黄金法则","修身齐家治国平天下：个人修养是一切的基础"],"quotes":["学而时习之，不亦说乎？","己所不欲，勿施于人。","三人行，必有我师焉。","吾日三省吾身。"],"lecture":{"essence":"<h2>两千五百年的人生智慧</h2><p>《论语》是孔子及其弟子言行的记录，成书于春秋战国时期。这本书没有系统的论证，只有一段段对话和格言，但它塑造了中国文化两千五百年，影响了数十亿人的思维方式和价值观。</p><p>孔子的核心关切是：<strong>在一个礼崩乐坏的时代，如何做一个好人，如何建立一个好社会？</strong></p><h3>仁：人与人之间的爱</h3><p>「仁」是《论语》最核心的概念，孔子对它的解释是：「爱人。」</p><p>但仁不是抽象的博爱，而是从具体的人际关系出发的爱：先爱父母，再爱兄弟，再爱朋友，再爱陌生人。这是一种有差等的爱，从近到远，从具体到抽象。</p><p>「己所不欲，勿施于人。」这是孔子对仁的最简洁表达，也是人类历史上最早的「黄金法则」之一。在你对别人做任何事之前，先问自己：如果别人这样对我，我愿意吗？</p><h3>君子：理想人格</h3><p>孔子的教育目标是培养「君子」——不是贵族身份，而是一种道德人格。君子的特征是：</p><p>「君子坦荡荡，小人长戚戚。」君子内心坦然，不为得失所扰；小人患得患失，总是忧虑。</p><p>「君子和而不同，小人同而不和。」君子能与不同意见的人和谐相处，但不盲目附和；小人表面一致，内心却各怀鬼胎。</p><p>「君子求诸己，小人求诸人。」君子遇到问题先反省自己，小人遇到问题先责怪别人。</p><h3>学而时习之：终身学习</h3><p>《论语》开篇第一句：「学而时习之，不亦说乎？」学习并且时常温习，不是很快乐吗？</p><p>孔子是中国历史上第一个提倡「有教无类」的教育家——不论出身，人人都可以接受教育。他的学生来自各个阶层，有贵族，有平民，有商人。</p><p>「学而不思则罔，思而不学则殆。」学习而不思考，就会迷惑；思考而不学习，就会危险。学习和思考必须结合，这是孔子对认知方法的深刻洞见。</p><h3>中庸：不是平庸，而是恰到好处</h3><p>「中庸之为德也，其至矣乎！」中庸是最高的美德。但中庸不是平庸，不是折中，而是「恰到好处」——在正确的时间、正确的地点、以正确的方式、做正确的事。</p><p>勇气是美德，但过度的勇气是鲁莽，不足的勇气是懦弱。慷慨是美德，但过度的慷慨是挥霍，不足的慷慨是吝啬。中庸是在两个极端之间找到恰当的平衡点。</p><h3>修身齐家治国平天下</h3><p>《大学》（儒家经典之一）提出了儒家的人生路径：格物、致知、诚意、正心、修身、齐家、治国、平天下。</p><p>这个路径的核心是：<strong>一切从自身修养开始。</strong>你无法治理好一个国家，如果你无法管理好自己的家庭；你无法管理好家庭，如果你无法修养自身；你无法修养自身，如果你的心不正、意不诚。</p><p>这是儒家最深刻的政治哲学：外部世界的秩序，根植于内心的秩序。","framework":[{"icon":"❤️","label":"仁：有差等的爱","desc":"仁是爱人，从父母兄弟到陌生人，是有差等的具体之爱。己所不欲，勿施于人是其最简洁表达。"},{"icon":"👑","label":"君子人格","desc":"君子是道德理想人格：坦荡荡、和而不同、求诸己——内心坦然，包容差异，自我反省。"},{"icon":"📚","label":"学思结合","desc":"学而不思则罔，思而不学则殆。学习与思考必须结合，这是孔子对认知方法的核心洞见。"},{"icon":"⚖️","label":"中庸之道","desc":"中庸不是平庸，而是恰到好处——在正确的时间、地点、方式做正确的事，避免两个极端。"},{"icon":"🏠","label":"修身为本","desc":"修身齐家治国平天下：外部世界的秩序根植于内心的秩序，一切从自身修养开始。"}],"actions":["今天，在一个冲突或分歧中，练习「己所不欲，勿施于人」：先问自己，如果对方这样对我，我愿意吗？","用「君子求诸己」的标准，回顾最近一次你责怪别人的情况，重新从自身找原因。","选择《论语》中一句你最有共鸣的话，写下它如何具体指导你今天的行动。","思考你生活中一个「过度」或「不足」的地方，用中庸的标准找到「恰到好处」的平衡点。"]}},{"id":44,"title":"西西弗神话","author":"阿尔贝·加缪","category":"philosophy","cover":"myth-of-sisyphus.jpg","rating":8.9,"goodreads":4.12,"pages":212,"year":1942,"tags":["存在主义","荒诞","哲学"],"summary":"加缪探讨了哲学中最根本的问题：生命是否值得活下去？他提出了「荒诞「的概念：人类对意义的渴望与世界的沉默之间的冲突。他的答案是：我们必须想象西西弗是幸福的。","outline":["荒诞的推理","哲学自杀","荒诞的自由","荒诞的创造","西西弗神话"],"keyPoints":["荒诞：人类对意义的渴望与世界的沉默之间的冲突","面对荒诞，有三种选择：自杀、哲学自杀（宗教）、反抗","加缪选择反抗：在荒诞中找到自由和创造","西西弗是荒诞英雄：明知徒劳，仍然推石上山","我们必须想象西西弗是幸福的"],"quotes":["只有一个真正严肃的哲学问题，那就是自杀。","我们必须想象西西弗是幸福的。","荒诞是人类最重要的感受之一。","反抗是人类尊严的唯一形式。"],"lecture":{"essence":"<h2>在荒诞中寻找幸福</h2><p>加缪在《西西弗神话》的开篇写道：<strong>「只有一个真正严肃的哲学问题，那就是自杀。」</strong>这句话震惊了无数读者，但加缪的意思恰恰相反——他要论证为什么值得活下去，即使生命是荒诞的。</p><p>西西弗是希腊神话中的人物，因为欺骗了神，被判处永恒的惩罚：把一块巨石推上山顶，然后看着它滚落，再推上去，永无止境。</p><p>加缪说：<strong>「我们必须想象西西弗是幸福的。」</strong></p><h3>荒诞的本质</h3><p>加缪的「荒诞」不是指滑稽可笑，而是指人类对意义的渴望与世界的沉默之间的冲突。</p><p>人类天生渴望意义、秩序、清晰。我们问：为什么我在这里？生命的目的是什么？死后会怎样？但宇宙对这些问题保持沉默。没有神明回答，没有自然规律给出答案，只有沉默。</p><p>这种渴望与沉默之间的张力，就是荒诞。荒诞不在人，也不在世界，而在两者的关系中。</p><h3>三种对荒诞的回应</h3><p>加缪认为，面对荒诞，人们通常有三种回应：</p><p><strong>哲学自杀</strong>：用宗教或意识形态「跳跃」到超越荒诞的意义系统。加缪批评克尔凯郭尔的「信仰的跳跃」——用上帝来填补意义的空缺。这是逃避，不是解决。</p><p><strong>肉体自杀</strong>：因为无法忍受荒诞而结束生命。加缪认为这是承认荒诞的胜利，是逃避而非反抗。</p><p><strong>反抗</strong>：承认荒诞，拒绝逃避，在荒诞中继续生活。这是加缪的选择，也是他认为唯一诚实的选择。</p><h3>反抗、自由与激情</h3><p>加缪的荒诞英雄有三个特征：</p><p><strong>反抗</strong>：不接受荒诞，不向它妥协，但也不逃避它。像西西弗一样，明知石头会滚落，仍然推上去。</p><p><strong>自由</strong>：正因为没有超越的意义，我们才完全自由。没有神明的命令，没有历史的使命，只有我们自己的选择。</p><p><strong>激情</strong>：在有限的生命中，尽可能多地体验，尽可能充分地活着。不是为了某个目的，而是为了体验本身。</p><h3>西西弗的幸福</h3><p>为什么西西弗是幸福的？加缪说，当西西弗推着石头下山，准备再次推上去的那一刻，他是清醒的。他知道自己的处境，他知道石头会再次滚落，但他选择继续。</p><p>这种清醒的反抗，这种在荒诞中的坚持，本身就是一种胜利。西西弗的幸福不来自石头到达山顶，而来自推石头的过程本身，来自他对自己命运的掌控感。</p><p>加缪的信息是：<strong>生命没有预设的意义，但这不是悲剧，而是自由。我们可以在荒诞中创造自己的意义，在反抗中找到幸福。</strong></p>","framework":[{"icon":"🌑","label":"荒诞的定义","desc":"荒诞是人类对意义的渴望与宇宙的沉默之间的冲突，不在人也不在世界，而在两者的关系中。"},{"icon":"🚫","label":"拒绝逃避","desc":"面对荒诞，宗教跳跃和自杀都是逃避。唯一诚实的选择是承认荒诞，在其中继续生活。"},{"icon":"✊","label":"反抗精神","desc":"荒诞英雄的核心是反抗：明知石头会滚落，仍然推上去。清醒的坚持本身就是一种胜利。"},{"icon":"🗽","label":"荒诞中的自由","desc":"正因为没有超越的意义，我们才完全自由。没有神明命令，只有自己的选择。"},{"icon":"😊","label":"西西弗的幸福","desc":"幸福不来自目标的实现，而来自过程本身和对自己命运的掌控感。我们必须想象西西弗是幸福的。"}],"actions":["思考你生活中一件「西西弗式」的任务——重复、没有终点，但你仍然在做。你能在其中找到意义吗？","加缪说荒诞是渴望与沉默的冲突。你最深的「渴望意义」的时刻是什么？你如何回应那种沉默？","思考你是否曾经用「哲学自杀」（宗教、意识形态）来逃避荒诞。这种逃避给你带来了什么？","写下一件你正在做的事情，不是为了某个目的，而是为了过程本身。这件事如何体现了加缪的「激情」？"]}},{"id":45,"title":"存在与时间","author":"马丁·海德格尔","category":"philosophy","cover":"being-and-time.jpg","rating":8.8,"goodreads":4.09,"pages":589,"year":1927,"tags":["存在主义","现象学","哲学"],"summary":"20世纪最重要的哲学著作之一。海德格尔重新提出了存在的问题，通过分析此在（人类存在）的结构，揭示了时间性是存在的基本特征。本书深刻影响了存在主义、解释学和后现代哲学。","outline":["存在问题的重提","此在的基本结构","在世存在","时间性与存在","向死而生"],"keyPoints":["存在问题被西方哲学遗忘了，需要重新追问","此在（Dasein）：人类是唯一追问自身存在的存在者","在世存在：人总是已经在世界中了","向死而生：死亡是此在最本己的可能性","时间性是存在的基本结构"],"quotes":["此在是唯一追问自身存在的存在者。","向死而生：死亡让我们真正活着。","语言是存在的家园。","人是被抛入世界的。"],"lecture":{"essence":"<h2>此在：我们是什么样的存在</h2><p>马丁·海德格尔的《存在与时间》（1927年）是20世纪最重要也最难读的哲学著作之一。海德格尔创造了大量新词，用极其晦涩的语言，追问一个最基本的问题：<strong>「存在」是什么意思？</strong></p><p>这个问题听起来很简单，但海德格尔认为，西方哲学两千年来一直在回避这个问题，把「存在」当作理所当然的背景，而不是追问的对象。</p><h3>此在：人类存在的独特性</h3><p>海德格尔用「此在」（Dasein，德语，字面意思是「在此存在」）来指称人类的存在方式。此在的独特性在于：<strong>此在是唯一一种对自己的存在有所关切的存在者。</strong></p><p>石头存在，但石头不关心自己的存在。动物存在，但动物不追问「我为什么存在」。只有人类，会对自己的存在感到困惑、焦虑，会追问存在的意义。</p><p>这种对存在的关切，是人类存在的根本特征。</p><h3>在世存在：我们总是已经在世界中</h3><p>海德格尔反对笛卡尔式的「主体-客体」二元论——一个孤立的意识主体面对外部世界。他认为，我们从来不是孤立的主体，我们总是已经「在世界中」了。</p><p>「在世存在」（Being-in-the-world）意味着：我们与世界的关系不是认识论的（我如何认识外部世界），而是实践的（我如何在世界中行动）。锤子对木匠来说不是一个认识对象，而是一个使用工具。世界首先是一个「用具整体」，而不是一堆物体。</p><h3>此在的沉沦：日常生活的遮蔽</h3><p>海德格尔认为，在日常生活中，此在往往处于「沉沦」状态——被「常人」（das Man，「人们」）所支配。</p><p>「人们」是一种匿名的社会力量：人们这样做，人们那样说，人们认为……我们在不知不觉中按照「人们」的标准生活，失去了自己的本真性。</p><p>这种沉沦不是道德上的堕落，而是此在的一种存在方式。但它遮蔽了此在的本真可能性。</p><h3>死亡：最本己的可能性</h3><p>海德格尔对死亡的分析是《存在与时间》最深刻的部分之一。他说，死亡是此在「最本己的、不可转让的、确定的、不确定何时的可能性」。</p><p>死亡是「最本己的」，因为没有人能替你死。死亡是「不可转让的」，因为你无法把死亡推给别人。死亡是「确定的」，因为每个人都必然死亡。死亡是「不确定何时的」，因为我们不知道什么时候死。</p><p>正是死亡的这种特性，使它成为此在本真存在的可能性。当我们真正面对死亡，我们才能从「常人」的支配中解脱出来，回到自己本真的存在。</p><h3>时间性：存在的意义</h3><p>海德格尔的最终答案是：<strong>存在的意义是时间性。</strong>此在是一种时间性的存在——它总是从过去来，向未来去，在当下存在。</p><p>理解存在，就是理解时间性。我们不是在时间中存在，我们就是时间性本身。","framework":[{"icon":"🧍","label":"此在的独特性","desc":"人类是唯一对自己的存在有所关切的存在者，这种对存在的追问是人类存在的根本特征。"},{"icon":"🌍","label":"在世存在","desc":"我们从来不是孤立的主体，总是已经在世界中。世界首先是实践的用具整体，而非认识的对象集合。"},{"icon":"👥","label":"常人与沉沦","desc":"日常生活中我们被匿名的「常人」支配，按照「人们」的标准生活，失去本真性。"},{"icon":"💀","label":"向死而生","desc":"死亡是最本己的、不可转让的可能性。真正面对死亡，才能从常人支配中解脱，回到本真存在。"},{"icon":"⏳","label":"时间性即存在","desc":"存在的意义是时间性。我们不是在时间中存在，我们就是时间性本身——从过去来，向未来去。"}],"actions":["思考你生活中哪些选择是「常人」的选择（人们都这样做），哪些是你本真的选择。","做一次「向死而生」的思考：如果你知道自己只剩一年，你会改变什么？这个答案告诉你什么是真正重要的？","注意今天你使用工具的方式：锤子、手机、电脑——它们是「上手」的（你在用它们），还是「在手」的（你在研究它们）？","海德格尔说我们总是「已经在世界中」。思考你的文化、语言、家庭如何在你意识到之前就塑造了你。"]}},{"id":46,"title":"理想国","author":"柏拉图","category":"philosophy","cover":"republic.jpg","rating":9.0,"goodreads":4.07,"pages":416,"year":-380,"tags":["政治哲学","正义","理想社会"],"summary":"西方哲学史上最重要的著作之一。通过苏格拉底与他人的对话，柏拉图探讨了正义的本质、理想国家的构建、哲学王的统治和灵魂的不朽。洞穴比喻是哲学史上最著名的思想实验。","outline":["正义是什么","理想城邦的构建","哲学王的统治","洞穴比喻：知识与无知","灵魂的不朽"],"keyPoints":["正义是每个人做自己应该做的事","理想国由哲学王统治，辅以武士和工匠","洞穴比喻：大多数人只看到影子，哲学家看到真实","理念论：真实世界是理念的世界，感官世界是影子","灵魂由理性、激情和欲望三部分组成"],"quotes":["哲学家必须成为国王，或者国王必须成为哲学家。","无知是最大的罪恶。","教育不是把知识放入灵魂，而是转动灵魂去看真实。","正义是每个人做自己应该做的事。"],"lecture":{"essence":"<h2>正义是什么？理想社会是什么样的？</h2><p>柏拉图的《理想国》写于公元前380年左右，是西方哲学史上最重要的著作之一。它以苏格拉底与朋友们的对话形式展开，追问两个核心问题：<strong>正义是什么？什么样的社会是理想的？</strong></p><p>这本书不只是政治哲学，它涵盖了认识论、形而上学、伦理学、教育学和美学，是一部真正的哲学百科全书。</p><h3>正义的定义之争</h3><p>对话从一个简单问题开始：正义是什么？</p><p>色拉叙马霍斯提出了一个挑衅性的答案：<strong>「正义是强者的利益。」</strong>统治者制定法律，法律对统治者有利，服从法律就是服从强者的利益。正义只是权力的伪装。</p><p>苏格拉底反驳说：如果正义只是强者的利益，那么当强者犯错时（制定了对自己不利的法律），服从这个错误的法律也是正义吗？</p><p>柏拉图通过苏格拉底提出了自己的答案：<strong>正义是每个人做自己应该做的事，各司其职，各得其所。</strong></p><h3>灵魂的三个部分</h3><p>柏拉图认为，人的灵魂有三个部分：理性、激情（意志）和欲望。</p><p>正义的个人，是理性统治激情和欲望的人。当理性做主，激情辅助理性，欲望服从理性，灵魂就处于和谐状态，这就是个人的正义。</p><p>不正义的人，是欲望或激情凌驾于理性之上的人。暴君是最不正义的人，因为他完全被欲望支配，看起来最自由，实际上是欲望的奴隶。</p><h3>理想国的三个阶层</h3><p>柏拉图把理想国分为三个阶层，对应灵魂的三个部分：</p><p><strong>哲学王（统治者）</strong>：对应理性，负责统治和决策。他们经过严格的哲学教育，了解「善的理念」，能做出正确的判断。</p><p><strong>武士（护卫者）</strong>：对应激情，负责保卫城邦。他们勇敢、忠诚，服从哲学王的统治。</p><p><strong>生产者（工匠、农民、商人）</strong>：对应欲望，负责生产物质财富。他们节制，服从统治。</p><p>理想国的正义，就是三个阶层各司其职，不相互僭越。</p><h3>洞穴比喻：哲学家的使命</h3><p>柏拉图最著名的比喻：囚犯被锁在洞穴里，只能看到墙上的影子，以为影子就是现实。哲学家挣脱枷锁，走出洞穴，看到了真实的阳光（善的理念）。</p><p>但哲学家有责任回到洞穴，帮助其他囚犯。这是哲学家的政治使命：不只是追求个人的智慧，还要用智慧服务社会。</p><h3>对理想国的批评</h3><p>《理想国》也受到了广泛批评。哲学王的统治是精英主义的，甚至是威权主义的。柏拉图主张废除私有财产和家庭（至少对统治阶层），这被认为是乌托邦式的幻想。</p><p>但《理想国》的价值不在于它的具体方案，而在于它提出的问题：<strong>什么是正义？什么样的社会值得追求？谁有资格统治？知识与权力的关系是什么？</strong>这些问题，两千四百年后仍然没有最终答案。","framework":[{"icon":"⚖️","label":"正义的本质","desc":"正义不是强者的利益，而是每个人各司其职、各得其所，灵魂和社会的和谐状态。"},{"icon":"🧠","label":"灵魂三分法","desc":"理性、激情、欲望三部分的和谐是个人正义。理性统治时人最自由，欲望统治时人是奴隶。"},{"icon":"🏛️","label":"哲学王统治","desc":"理想国由了解善的理念的哲学家统治，三个阶层各司其职，这是柏拉图的政治理想。"},{"icon":"🕯️","label":"洞穴比喻","desc":"哲学家走出洞穴看到真实，但有责任回来帮助他人。知识不只是个人追求，也是社会责任。"},{"icon":"❓","label":"永恒的问题","desc":"什么是正义？谁有资格统治？知识与权力的关系是什么？这些问题两千年后仍无最终答案。"}],"actions":["思考你生活中「理性、激情、欲望」三者的平衡：哪个部分在主导你的决策？你满意这个状态吗？","用柏拉图的正义定义审视你的工作：你是否在做「应该做的事」，还是在僭越或逃避？","思考「哲学王」的概念：如果最聪明、最有德行的人来治理，你的社会会变成什么样？","读《理想国》第一卷关于正义的辩论，选择一个你最认同的立场，写下理由。"]}},{"id":47,"title":"尼各马可伦理学","author":"亚里士多德","category":"philosophy","cover":"nicomachean-ethics.jpg","rating":8.9,"goodreads":4.05,"pages":368,"year":-350,"tags":["伦理学","幸福","美德"],"summary":"亚里士多德最重要的伦理学著作。他认为人生的最高目标是幸福（eudaimonia），幸福来自于按照美德生活。美德是通过习惯养成的，是过度与不足之间的中道。","outline":["幸福：人生的最高目标","美德的本质","中道原则","友谊与幸福","沉思的生活"],"keyPoints":["幸福（eudaimonia）是人生的最高目标，是灵魂按照美德的活动","美德是通过习惯养成的，不是天生的","中道原则：美德是过度与不足之间的中间状态","友谊是幸福生活的重要组成部分","沉思的生活是最高形式的幸福"],"quotes":["我们是我们反复做的事情。因此，卓越不是一个行为，而是一种习惯。","幸福是灵魂按照美德的活动。","美德是通过习惯养成的。","中道是美德的标志。"],"lecture":{"essence":"<h2>幸福是一种活动，不是一种状态</h2><p>亚里士多德在两千三百年前写下的《尼各马可伦理学》，至今仍是西方伦理学最重要的奠基之作。这本书的核心问题只有一个：<strong>人应该如何生活，才能真正幸福？</strong></p><p>亚里士多德的回答出人意料地务实：幸福（eudaimonia）不是一种感觉，不是快乐，不是财富，不是荣誉——而是一种<strong>活动</strong>，是灵魂按照卓越德性的活动。换句话说，幸福是你在做你最擅长、最符合人类本性的事情时的那种状态。</p><h3>人的功能论证</h3><p>亚里士多德问：刀的功能是切割，眼睛的功能是看见，那么人的功能是什么？他的答案是：<strong>理性的活动</strong>。人是理性动物，人的卓越就在于运用理性生活。一个好的人，就是把理性运用得好的人；一个幸福的人，就是持续地、卓越地运用理性生活的人。</p><p>这个论证有一个重要推论：幸福不是偶尔的高峰体验，而是<strong>一生的事业</strong>。「一燕不成夏」——一天的美德不能造就幸福，需要一生持续的卓越实践。</p><h3>德性的本质：中道</h3><p>亚里士多德最著名的伦理学概念是<strong>中道（mesotes）</strong>。每一种德性都是两种恶习之间的中间状态：勇敢是鲁莽与懦弱之间的中道；慷慨是挥霍与吝啬之间的中道；自尊是傲慢与自卑之间的中道。</p><p>但中道不是平庸，不是「各打五十大板」。中道是<strong>在正确的时间、对正确的人、以正确的方式、做正确的事</strong>。这需要实践智慧（phronesis）——一种通过经验积累的判断能力，无法从书本上学到。</p><h3>两种幸福：享乐与沉思</h3><p>亚里士多德区分了两种幸福生活：一种是<strong>政治生活</strong>，通过实践德性、参与公共事务获得幸福；另一种是<strong>沉思生活</strong>，通过哲学思考、追求真理获得最高幸福。他认为沉思生活是最高的，因为理性是人最神圣的部分，沉思最接近神的活动。</p><p>但他也承认，人不是纯粹的理性存在，我们需要朋友、健康、适度的财富。完全的幸福需要<strong>外在善</strong>的配合。这是亚里士多德比柏拉图更接地气的地方。</p><h3>友谊：灵魂的镜子</h3><p>亚里士多德用两卷篇幅讨论友谊，这在伦理学著作中极为罕见。他认为友谊是幸福生活不可或缺的部分。他区分三种友谊：基于<strong>利益</strong>的友谊（最脆弱）、基于<strong>快乐</strong>的友谊（次之）、基于<strong>德性</strong>的友谊（最高级，朋友是「另一个自我」）。</p><p>真正的友谊不是互相利用，而是互相欣赏对方的德性，共同追求善的生活。「没有朋友，没有人愿意活着，即使拥有一切其他善。」</p><h3>为什么两千年后仍然重要</h3><p>现代社会把幸福等同于快乐、财富、成功。亚里士多德告诉我们：这些都是幸福的条件，但不是幸福本身。真正的幸福来自<strong>卓越地活着</strong>——发挥你最好的能力，实践你认为最重要的德性，与真正的朋友共度时光，持续地、认真地生活。</p><p>这不是一个容易的答案，但它是一个诚实的答案。</p>","framework":[{"icon":"🎯","label":"幸福即活动","desc":"幸福不是感受或状态，而是灵魂按照卓越德性持续活动的过程。一生的卓越实践，而非一时的高峰体验。"},{"icon":"⚖️","label":"中道原则","desc":"每种德性都是两种极端之间的中道。勇敢在鲁莽与懦弱之间，慷慨在挥霍与吝啬之间。中道需要实践智慧，无法从书本习得。"},{"icon":"🧠","label":"实践智慧","desc":"phronesis，在具体情境中做出正确判断的能力。这是所有德性的统帅，只能通过经验和反思积累，不能靠规则推导。"},{"icon":"👥","label":"德性友谊","desc":"最高级的友谊基于对彼此德性的欣赏。朋友是另一个自我，真正的友谊是幸福生活不可或缺的组成部分。"},{"icon":"🌟","label":"沉思生活","desc":"哲学沉思是最高的幸福，因为理性是人最神圣的部分。但完整的幸福也需要健康、友谊和适度的外在善。"}],"actions":["用亚里士多德的中道框架审视你的一个重要品质：你是偏向哪个极端？如何找到中道？","列出你生命中三段友谊，判断它们分别属于哪种类型（利益、快乐、德性）。你最渴望哪种？","思考你的「功能」：作为人，你认为自己最卓越的能力是什么？你是否在充分发挥它？","今天做一件需要实践智慧的决定，事后反思：你是如何判断「正确的方式」的？"]}},{"id":48,"title":"禅与摩托车维修艺术","author":"罗伯特·波西格","category":"philosophy","cover":"zen-motorcycle.jpg","rating":8.8,"goodreads":3.76,"pages":540,"year":1974,"tags":["哲学","质量","自我探索"],"summary":"一部融合了哲学探索与公路旅行的独特著作。作者通过横跨美国的摩托车之旅，探讨了「质量「的本质、技术与人文的关系，以及现代人的精神困境。本书是20世纪最畅销的哲学书之一。","outline":["公路旅行与哲学思考","古典模式与浪漫模式","质量的本质","刀锋：理性与直觉","父子关系与自我和解"],"keyPoints":["质量是无法定义但可以感知的，它先于主客体的分离","古典模式（理性）与浪漫模式（直觉）的对立与统一","真正的维修艺术需要内心的平静","技术不是人文的对立面，而是人类创造力的体现","自我探索是一段永无终点的旅程"],"quotes":["真正的摩托车维修艺术，是内心的平静。","质量是无法定义的，但你知道它是什么。","佛陀或耶稣坐在电脑和变速器的齿轮中，就像坐在山顶或莲花上一样自在。","旅行的目的不是到达目的地，而是旅行本身。"],"lecture":{"essence":"<h2>骑摩托车横穿美国，寻找什么是质量</h2><p>1974年出版的《禅与摩托车维修艺术》是一本奇特的书：表面上是一个父亲带着儿子骑摩托车横穿美国的公路旅行故事，实际上是一部深刻的哲学探索，追问一个核心问题：<strong>什么是质量（Quality）？</strong></p><p>作者罗伯特·波西格用「斐德洛斯」这个名字代指自己的前半生——一个被强制电休克治疗、失去记忆的哲学狂人。整本书是他试图重新理解斐德洛斯的思想，同时与儿子克里斯重建关系的旅程。</p><h3>古典思维与浪漫思维的裂缝</h3><p>波西格观察到现代人对技术的两种态度：一种是<strong>浪漫主义者</strong>，他们欣赏摩托车的外观和骑行感受，但对发动机一无所知，也不想知道；另一种是<strong>古典主义者</strong>，他们理解机械原理，能够维修保养，但往往失去了对骑行本身的热情。</p><p>这两种态度代表了现代文明的深层裂缝：<strong>科学理性与人文感性的分裂</strong>。我们建造了强大的技术文明，却感到与它疏离；我们追求效率，却失去了意义。</p><h3>质量：先于主客体的存在</h3><p>斐德洛斯/波西格的核心洞见是：<strong>质量不是主观的，也不是客观的，它先于主客体的分裂而存在。</strong></p><p>当你看到一件做工精良的东西，你立刻知道它是好的——这个判断发生在你分析它之前。质量是直接的感知，是人与世界接触的第一个层面。古希腊人用「arete」（卓越/美德）来描述这种东西，它同时适用于人和物。</p><p>现代哲学把世界分成主观（心灵）和客观（物质），质量被夹在中间，无处安放。波西格认为这个分裂是西方文明焦虑的根源。</p><h3>刀锋上的禅：投入与在场</h3><p>书名中的「禅」不是宗教，而是一种<strong>完全投入当下的状态</strong>。当一个好的摩托车修理工工作时，他不是在「修理摩托车」，他与摩托车融为一体，他的手、工具、机器和问题构成一个整体。这就是禅。</p><p>波西格认为，现代人的异化感来自于我们与工作、与技术、与自然的<strong>主客体分裂</strong>。我们把自己当成主体，把世界当成客体，然后感到孤独和疏离。真正的质量工作需要打破这个分裂，完全在场。</p><h3>卡住了怎么办：创造力的本质</h3><p>书中有一段著名的「卡住了」（stuck）的讨论。当你在维修摩托车时卡住了，不知道问题在哪里，这时候怎么办？波西格说：<strong>卡住本身就是答案的入口。</strong>卡住意味着你的假设框架遇到了边界，这是突破的时机。</p><p>他提出「假设陷阱」：我们总是在已有的概念框架内寻找答案，但有时候问题本身就在框架之外。真正的创造力需要<strong>放下框架，直接面对现象</strong>。</p><h3>父子关系：理解与爱</h3><p>在哲学探索之外，这本书也是一个关于父子关系的故事。波西格与儿子克里斯的关系紧张而复杂——儿子渴望父亲的关注，父亲却沉浸在自己的思想世界里。旅程的终点，父亲终于真正看见了儿子，两人之间的隔阂开始消融。</p><p>这个故事提醒我们：<strong>理解一个人，需要和理解质量一样的投入与在场。</strong>爱不是一种感情，而是一种注意力的实践。</p><h3>为什么这本书改变了无数人</h3><p>《禅与摩托车维修艺术》在1974年出版时被121家出版社拒绝，最终成为畅销书，影响了几代人。它触动了现代人内心深处的一个痛点：我们生活在技术文明中，却感到与它格格不入；我们追求成功，却不知道什么是真正的好。</p><p>波西格给出的答案不是逃离技术，而是<strong>以不同的方式与技术相处</strong>——带着关怀、投入和在场，而不是疏离和焦虑。这是一种生活哲学，也是一种工作哲学。</p>","framework":[{"icon":"🔧","label":"古典与浪漫","desc":"现代人对技术的两种态度：浪漫主义者欣赏表象但疏离原理，古典主义者理解结构但失去热情。两者的分裂是现代焦虑的根源。"},{"icon":"✨","label":"质量先于分裂","desc":"质量不是主观感受，也不是客观属性，它先于主客体的分裂而存在。你在分析之前就感知到好坏，这是人与世界最原初的接触。"},{"icon":"🧘","label":"禅：完全在场","desc":"真正的质量工作需要打破主客体分裂，完全投入当下。好的工匠与工作融为一体，这种状态就是禅，也是消除异化感的方式。"},{"icon":"🚧","label":"卡住即入口","desc":"遇到障碍时，卡住本身是突破的信号。它意味着你的假设框架遇到了边界。放下框架，直接面对现象，才能找到真正的答案。"},{"icon":"❤️","label":"关怀即质量","desc":"对工作、对人、对世界的关怀（care）是质量的本质。没有关怀的技术是冷漠的，没有关怀的关系是空洞的。"}],"actions":["找一件你日常使用的工具或设备，花10分钟真正了解它的工作原理。感受理解带来的不同。","回想一次你完全投入某项工作、忘记时间的经历。那时候你在做什么？如何创造更多这样的时刻？","下次遇到问题卡住时，不要立刻搜索答案，先问自己：我的哪个假设可能是错的？","思考你生活中最重要的一段关系：你是否真正在场？还是身体在场而注意力不在？"]}}]};

// ===== Init =====
function init() {
  try {
    allBooks = BOOKS_DATA.books || [];
    allCategories = BOOKS_DATA.categories || [];
    renderCategories();
    renderBookGrid(allBooks);
    renderListenPage();
    updateBannerStats();
    // 初始化继续学习（从 localStorage 读取，不依赖登录）
    const localLastBook = localStorage.getItem('zg_last_book');
    if (localLastBook) { lastBookId = parseInt(localLastBook); renderContinueReading(); }
    // 初始化勋章状态（检查是否有新勋章未查看）
    const prevBadges = new Set(getEarnedBadgeIds());
    const currentBadges = computeEarnedBadges();
    const hasNew = currentBadges.some(id => !prevBadges.has(id));
    if (hasNew) {
      newBadgeIds = currentBadges.filter(id => !prevBadges.has(id));
      localStorage.setItem('zg_badges', JSON.stringify(currentBadges));
      const dot = document.getElementById('nav-badge-dot');
      if (dot) dot.style.display = 'block';
    }
    initAuth();
  } catch(e) {
    console.error('初始化失败', e);
    const grid = document.getElementById('book-grid');
    if (grid) grid.innerHTML = '<div style="grid-column:1/-1;color:#ff6b6b;padding:20px;font-size:12px">错误: ' + e.message + '</div>';
  }
}

// ===== Storage（本地 + 云同步）=====
function getReadList() { return JSON.parse(localStorage.getItem('zg_read') || '[]'); }
function getWantList() { return JSON.parse(localStorage.getItem('zg_want') || '[]'); }

async function toggleRead(id) {
  let list = getReadList();
  const idx = list.indexOf(id);
  const adding = idx === -1;
  if (adding) { list.push(id); let w = getWantList(); const wi = w.indexOf(id); if (wi > -1) { w.splice(wi, 1); localStorage.setItem('zg_want', JSON.stringify(w)); } }
  else list.splice(idx, 1);
  localStorage.setItem('zg_read', JSON.stringify(list));
  updateBannerStats();
  if (adding) checkAndUpdateBadges();
  if (currentUser) {
    if (adding) await supa.from('reading_progress').upsert({ user_id: currentUser.id, book_id: id, status: 'finished', last_read_at: new Date().toISOString() }, { onConflict: 'user_id,book_id' });
    else await supa.from('reading_progress').delete().eq('user_id', currentUser.id).eq('book_id', id).eq('status', 'finished');
  }
}

async function toggleWant(id) {
  let list = getWantList();
  const idx = list.indexOf(id);
  const adding = idx === -1;
  if (adding) list.push(id); else list.splice(idx, 1);
  localStorage.setItem('zg_want', JSON.stringify(list));
  updateBannerStats();
  if (currentUser) {
    if (adding) await supa.from('reading_progress').upsert({ user_id: currentUser.id, book_id: id, status: 'want', last_read_at: new Date().toISOString() }, { onConflict: 'user_id,book_id' });
    else await supa.from('reading_progress').delete().eq('user_id', currentUser.id).eq('book_id', id).eq('status', 'want');
  }
}

function isRead(id) { return getReadList().includes(id); }
function isWant(id) { return getWantList().includes(id); }

function isCatDone(readList, cats, catId) {
  if (!allBooks.length) return false;
  const catBooks = allBooks.filter(b => b.category === catId);
  return catBooks.length > 0 && catBooks.every(b => readList.includes(b.id));
}

function getEarnedBadgeIds() {
  return JSON.parse(localStorage.getItem('zg_badges') || '[]');
}

function computeEarnedBadges() {
  const readList = getReadList();
  return BADGE_DEFS.filter(b => b.check(readList, allCategories)).map(b => b.id);
}

function checkAndUpdateBadges() {
  const prev = new Set(getEarnedBadgeIds());
  const current = computeEarnedBadges();
  const newOnes = current.filter(id => !prev.has(id));
  if (newOnes.length > 0) {
    localStorage.setItem('zg_badges', JSON.stringify(current));
    newBadgeIds = [...new Set([...newBadgeIds, ...newOnes])];
    // 显示红点
    const dot = document.getElementById('nav-badge-dot');
    if (dot) dot.style.display = 'block';
    // Toast 提示
    const badge = BADGE_DEFS.find(b => b.id === newOnes[0]);
    if (badge) showToast(`🎉 解锁勋章：${badge.icon} ${badge.name}！`);
  } else {
    localStorage.setItem('zg_badges', JSON.stringify(current));
  }
}

function switchPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'shelf') renderShelf(currentShelfTab);
  if (name === 'listen') renderListenPage();
  if (name === 'badges') {
    renderMyUserSection();
    renderBadgesPage();
    // 清除红点
    newBadgeIds = [];
    const dot = document.getElementById('nav-badge-dot');
    if (dot) dot.style.display = 'none';
  }
}

function goHome() {
  // 如果在详情页，先退回
  const detail = document.getElementById('page-detail');
  if (detail && detail.classList.contains('active')) {
    goBack();

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  document.getElementById('page-home').classList.add('active');
  document.querySelectorAll('.nav-item')[0].classList.add('active');
}

function copyWechat() {
  const wechat = 'diyiwuyan';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(wechat).then(() => showToast('微信号已复制 ✓'));
  } else {
    const el = document.createElement('input');
    el.value = wechat;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('微信号已复制 ✓');
  }
}

function renderBadgesPage() {
  const earned = new Set(computeEarnedBadges());
  const prevEarned = new Set(getEarnedBadgeIds());
  const total = BADGE_DEFS.length;
  const earnedCount = earned.size;

  // 更新进度条
  const countEl = document.getElementById('badge-earned-count');
  const totalEl = document.getElementById('badge-total-count');
  const fillEl = document.getElementById('badge-progress-fill');
  if (countEl) countEl.textContent = earnedCount;
  if (totalEl) totalEl.textContent = total;
  if (fillEl) fillEl.style.width = Math.round((earnedCount / total) * 100) + '%';

  // 分组渲染
  const milestones = BADGE_DEFS.filter(b => ['first_book','five_books','ten_books','twenty_books','consistent','all_books'].includes(b.id));
  const categories = BADGE_DEFS.filter(b => b.id.endsWith('_done'));
  const special = BADGE_DEFS.filter(b => ['early_bird'].includes(b.id));

  const container = document.getElementById('badges-content');
  if (!container) return;

  function renderGroup(title, defs) {
    const isNew = (id) => newBadgeIds.includes(id) || (!prevEarned.has(id) && earned.has(id));
    return `
    <div class="badge-section-title">${title}</div>
    <div class="badge-grid">
      ${defs.map(b => {
        const isEarned = earned.has(b.id);
        return `
        <div class="badge-item ${isEarned ? 'earned' : 'locked'}" onclick="${isEarned ? `openBadgeShare('${b.id}')` : ''}">
          ${isEarned && isNew(b.id) ? '<span class="badge-new-mark">NEW</span>' : ''}
          ${isEarned ? '<span class="badge-earned-mark">✨</span>' : ''}
          <span class="badge-icon">${b.icon}</span>
          <div class="badge-name">${b.name}</div>
          <div class="badge-desc">${b.desc}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  container.innerHTML =
    renderGroup('🏆 阅读里程碑', milestones) +
    renderGroup('📂 领域完成', categories) +
    renderGroup('⭐ 特殊成就', special) +
    '<div style="height:20px"></div>';
}

function saveBadgeCard() {
  const card = document.getElementById('badge-share-card').firstElementChild;

  if (typeof html2canvas === 'undefined') { showToast('图片生成功能需要网络支持'); return; }
  showToast('正在生成图片...');

async function syncProgressFromCloud() {
  if (!currentUser) return;
  const { data, error } = await supa.from('reading_progress').select('book_id,status').eq('user_id', currentUser.id);
  if (error || !data) return;
  localStorage.setItem('zg_read', JSON.stringify(data.filter(r => r.status === 'finished').map(r => r.book_id)));
  localStorage.setItem('zg_want', JSON.stringify(data.filter(r => r.status === 'want').map(r => r.book_id)));
  updateBannerStats();
  renderBookGrid(currentCat === 'all' ? allBooks : allBooks.filter(b => b.category === currentCat));
  renderShelf(currentShelfTab);
  checkAndUpdateBadges();
  showToast('进度已同步 ☁️');
}

function updateBannerStats() {
  const r = document.getElementById('stat-read'); if (r) r.textContent = getReadList().length;
  const w = document.getElementById('stat-want'); if (w) w.textContent = getWantList().length;
}

// ===== HTML Escape =====
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ===== Cover Colors =====
const coverColors = [
  ['#1a1a3e','#2d1b69'], ['#1e3a2f','#0d5c3a'], ['#3a1a1a','#6b2020'],
  ['#1a2a3e','#1b4d6b'], ['#2a1a3e','#5c1b6b'], ['#3e2a1a','#6b4d1b'],
  ['#1a3e3a','#1b6b5c'], ['#3e1a2a','#6b1b4d']
];
function getCoverColor(id) { return coverColors[(id - 1) % coverColors.length]; }
function getCoverEmoji(cat) {
  const map = { mindset:'🧠', wealth:'💰', psychology:'🌱', leadership:'🏆', science:'🔭', philosophy:'☯️' };
  return map[cat] || '📖';
}

// ===== Render Categories =====
function renderCategories() {
  const container = document.getElementById('category-pills');
  let html = `<div class="cat-pill active" style="background:var(--accent);color:#fff" onclick="filterCat('all', this)">全部</div>`;
  allCategories.forEach(cat => {
    html += `<div class="cat-pill" style="--cat-color:${cat.color}" onclick="filterCat('${cat.id}', this)">${cat.icon} ${cat.name}</div>`;
  });
  container.innerHTML = html;
}

function filterCat(catId, el) {
  currentCat = catId;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = '';
  });
  el.classList.add('active');
  if (catId === 'all') {
    el.style.background = 'var(--accent)';
    el.style.color = '#fff';
  } else {
    const cat = allCategories.find(c => c.id === catId);
    if (cat) { el.style.background = cat.color; el.style.color = '#fff'; }
  }
  const filtered = catId === 'all' ? allBooks : allBooks.filter(b => b.category === catId);
  const catName = catId === 'all' ? '全部书籍' : allCategories.find(c => c.id === catId)?.name || '';
  document.getElementById('grid-title').textContent = catName;
  document.getElementById('grid-count').textContent = filtered.length + '本';
  renderBookGrid(filtered);
}

// ===== Render Book Grid =====
function renderBookGrid(books) {
  const grid = document.getElementById('book-grid');
  if (!books.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">暂无书籍</div>'; return; }
  grid.innerHTML = books.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const read = isRead(book.id);
    const want = isWant(book.id);
    const safeTitle = esc(book.title);
    const safeAuthor = esc(book.author.split('/')[0].trim());
    return `
    <div class="book-card" onclick="openDetail(${book.id})">
      <div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">
        <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${safeTitle}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="cover-fallback" style="display:none">
          <span style="font-size:28px">${emoji}</span>
          <div class="cover-title">${safeTitle}</div>
          <div class="cover-author">${safeAuthor}</div>
        </div>
      </div>
      ${read ? '<div class="read-badge">已读</div>' : want ? '<div class="want-badge">想读</div>' : ''}
      <div class="book-info">
        <div class="book-title">${safeTitle}</div>
        <div class="book-author">${safeAuthor}</div>
        <div class="book-rating">★ ${book.rating}</div>
      </div>
    </div>`;
  }).join('');
}

// ===== Page Navigation =====
function openDetail(bookId) {
  const book = allBooks.find(b => b.id === bookId);
  if (!book) return;
  currentBook = book;
  prevPage = document.querySelector('.page.active')?.id?.replace('page-', '') || 'home';
  renderDetail(book);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('page-detail').scrollTop = 0;
  // 记录上次学习进度
  recordLastBook(bookId);
}

async function recordLastBook(bookId) {
  if (lastBookId === bookId) return;
  lastBookId = bookId;
  localStorage.setItem('zg_last_book', String(bookId));
  renderContinueReading();
  if (currentUser) {
    await supa.from('profiles').upsert({ id: currentUser.id, last_book_id: bookId, updated_at: new Date().toISOString() }, { onConflict: 'id' });
  }
}

function renderContinueReading() {
  const wrap = document.getElementById('continue-reading-wrap');
  if (!wrap) return;
  // 未登录时也从 localStorage 读取
  const bid = lastBookId || parseInt(localStorage.getItem('zg_last_book') || '0');
  if (!bid || !allBooks.length) { wrap.innerHTML = ''; return; }
  const book = allBooks.find(b => b.id === bid);
  if (!book) { wrap.innerHTML = ''; return; }
  const [c1, c2] = getCoverColor(book.id);
  const emoji = getCoverEmoji(book.category);
  const safeTitle = esc(book.title);
  const safeAuthor = esc(book.author.split('/')[0].trim());
  wrap.innerHTML = `
  <div class="continue-card" onclick="openDetail(${book.id})">
    <div class="continue-cover" style="background:linear-gradient(135deg,${c1},${c2})">
      <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${safeTitle}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span style="display:none;font-size:22px">${emoji}</span>
    </div>
    <div class="continue-info">
      <div class="continue-label">▶ 继续学习</div>
      <div class="continue-title">${safeTitle}</div>
      <div class="continue-author">${safeAuthor}</div>
    </div>
    <div class="continue-arrow">›</div>
  </div>`;
}

function goBack() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + prevPage).classList.add('active');
  // sync nav
  const navMap = { home: 0, listen: 1, shelf: 2 };

  navItems.forEach(n => n.classList.remove('active'));
  if (navMap[prevPage] !== undefined) navItems[navMap[prevPage]].classList.add('active');

// ===== Listen =====
function openListenPage(bookId) {
  const book = allBooks.find(b => b.id === bookId);
  if (!book) return;
  startListening(book);
  // Switch to listen page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-listen').classList.add('active');
  document.querySelectorAll('.nav-item')[1].classList.add('active');
  prevPage = 'listen';
}

function buildListenText(book) {
  const lec = book.lecture;
  if (lec) {
    // 用讲书内容：更自然、更有深度
    const parts = [];
    // 开场白
    parts.push(`欢迎收听周公解书。今天为您带来《${book.title}》，作者${book.author}。`);
    // 精华解读（按句号分段，每段不超过120字）
    const essenceSentences = lec.essence
      .replace(/<[^>]+>/g, '')  // 去 HTML 标签
      .split(/[。！？]/)
      .filter(s => s.trim().length > 5);
    let chunk = '';
    for (const s of essenceSentences) {
      chunk += s + '。';
      if (chunk.length >= 80) { parts.push(chunk.trim()); chunk = ''; }
    }
    if (chunk.trim()) parts.push(chunk.trim());
    // 思维框架
    parts.push('下面为您介绍本书的核心思维框架。');
    lec.framework.forEach((f, i) => {
      const desc = f.desc.replace(/<[^>]+>/g, '');
      parts.push(`第${i+1}个框架：${f.label}。${desc}`);
    });
    // 行动清单
    parts.push('最后，是读完这本书后，您可以立刻付诸行动的清单。');
    lec.actions.forEach((a, i) => {
      const text = a.replace(/<[^>]+>/g, '');
      parts.push(`行动${i+1}：${text}`);
    });
    parts.push(`以上就是《${book.title}》的精华解读，感谢收听周公解书。`);
    return parts;
  }
  // 降级：用原始内容
  const parts = [
    `欢迎收听周公解书。今天为您带来《${book.title}》，作者${book.author}。`,
    `内容简介：${book.summary}`,
    `核心观点：`,
    ...book.keyPoints.map((kp, i) => `第${i+1}点：${kp}`),
    `经典金句：`,
    ...book.quotes,
    `以上就是《${book.title}》的精华解读，感谢收听周公解书。`
  ];
  return parts;
}

function startListening(book) {
  stopSpeech();
  listenBook = book;
  listenTextChunks = buildListenText(book);
  listenChunkIndex = 0;
  listenProgress = 0;
  renderListenPlayer(book);
  renderListenBookList();
}

function renderListenPage() {
  if (!listenBook && allBooks.length > 0) {
    listenBook = allBooks[0];
    listenTextChunks = buildListenText(listenBook);
    listenChunkIndex = 0;
  }
  if (listenBook) {
    renderListenPlayer(listenBook);
  }
  renderListenBookList();
}

function renderListenPlayer(book) {
  const [c1, c2] = getCoverColor(book.id);
  const emoji = getCoverEmoji(book.category);
  const totalChunks = buildListenText(book).length;
  const progress = listenBook?.id === book.id ? Math.round((listenChunkIndex / Math.max(totalChunks, 1)) * 100) : 0;
  const currentText = listenBook?.id === book.id && listenTextChunks[listenChunkIndex] ? listenTextChunks[listenChunkIndex] : (buildListenText(book)[0] || '');

  document.getElementById('listen-player').innerHTML = `
  <div class="listen-hero">
    <div class="listen-cover" style="background:linear-gradient(135deg,${c1},${c2})">
      <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;text-align:center;padding:8px;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%">
        <div style="font-size:36px">${emoji}</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.6);margin-top:4px">${book.title}</div>
      </div>
    </div>
    <div class="listen-title">${book.title}</div>
    <div class="listen-author">${book.author}</div>
  </div>
  <div class="listen-progress">
    <div class="progress-bar-wrap" onclick="seekProgress(event, this)">
      <div class="progress-bar-fill" id="listen-progress-bar" style="width:${progress}%"></div>
    </div>
    <div class="progress-times">
      <span id="listen-current-chunk">${listenChunkIndex + 1} / ${totalChunks}</span>
      <span id="listen-total-chunks">${totalChunks} 段</span>
    </div>
  </div>
  <div class="listen-controls">
    <button class="ctrl-btn" onclick="prevChunk()" title="上一段">⏮</button>
    <button class="ctrl-btn play-btn" id="play-pause-btn" onclick="togglePlay()">${isPlaying && listenBook?.id === book.id ? '⏸' : '▶'}</button>
    <button class="ctrl-btn" onclick="nextChunk()" title="下一段">⏭</button>
    <button class="speed-btn" onclick="cycleSpeed()" id="speed-btn">${listenSpeed}x</button>
  </div>
  <div class="listen-text-area">
    <div class="listen-text" id="listen-text-display">${currentText}</div>
  </div>
  `;
}

function renderListenBookList() {
  const container = document.getElementById('listen-book-list');
  if (!container || !allBooks.length) return;
  container.innerHTML = allBooks.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const active = listenBook?.id === book.id;
    const chunks = buildListenText(book).length;
    return `
    <div class="listen-book-item ${active ? 'active' : ''}" onclick="startListening(allBooks.find(b=>b.id===${book.id}))">
      <div class="listen-book-thumb" style="background:linear-gradient(135deg,${c1},${c2})">
        <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span style="display:none">${emoji}</span>
      </div>
      <div class="listen-book-info">
        <div class="listen-book-name">${book.title}</div>
        <div class="listen-book-author">${book.author.split('/')[0].trim()}</div>
        <div class="listen-book-duration">约 ${chunks} 段内容</div>
      </div>
      <div class="listen-play-icon">${active && isPlaying ? '🔊' : '▶'}</div>
    </div>`;
  }).join('');
}

function togglePlay() {
  if (!listenBook) return;
  if (isPlaying) {
    pauseSpeech();
  } else {
    playSpeech();
  }
}

function playSpeech() {
  if (!listenBook || !listenTextChunks.length) return;
  if (speechSynth.paused) {
    speechSynth.resume();
    isPlaying = true;
    updatePlayBtn();
    return;
  }
  speakChunk(listenChunkIndex);
}

function speakChunk(index) {
  if (index >= listenTextChunks.length) {
    isPlaying = false;
    updatePlayBtn();
    showToast('🎉 朗读完毕！');
    return;
  }
  stopSpeech();
  listenChunkIndex = index;
  const text = listenTextChunks[index];
  updateListenDisplay(text, index);

  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'zh-CN';
  currentUtterance.rate = listenSpeed * 0.92; // 稍慢更自然
  currentUtterance.pitch = 1.05;
  currentUtterance.volume = 1.0;

  // 优先选高质量中文声音（微软 Xiaoxiao > 其他神经网络声音 > 本地声音）
  const voices = speechSynth.getVoices();
  const preferredNames = ['Microsoft Xiaoxiao', 'Microsoft Yunxi', 'Microsoft Xiaoyi', 'Tingting', 'Meijia'];
  let zhVoice = null;
  for (const name of preferredNames) {
    zhVoice = voices.find(v => v.name.includes(name));
    if (zhVoice) break;
  }
  if (!zhVoice) zhVoice = voices.find(v => v.lang === 'zh-CN' && !v.localService)
                          || voices.find(v => v.lang === 'zh-CN')
                          || voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) currentUtterance.voice = zhVoice;

  currentUtterance.onend = () => {
    if (isPlaying) speakChunk(index + 1);
  };
  currentUtterance.onerror = (e) => {
    if (e.error !== 'interrupted') { isPlaying = false; updatePlayBtn(); }
  };

  isPlaying = true;
  updatePlayBtn();
  speechSynth.speak(currentUtterance);
}

function pauseSpeech() {
  speechSynth.pause();
  isPlaying = false;
  updatePlayBtn();
}

function stopSpeech() {
  speechSynth.cancel();
  isPlaying = false;
}

function prevChunk() {
  if (listenChunkIndex > 0) speakChunk(listenChunkIndex - 1);
}

function nextChunk() {
  if (listenChunkIndex < listenTextChunks.length - 1) speakChunk(listenChunkIndex + 1);
}

function cycleSpeed() {
  const speeds = [0.75, 1.0, 1.25, 1.5, 2.0];
  const idx = speeds.indexOf(listenSpeed);
  listenSpeed = speeds[(idx + 1) % speeds.length];
  const btn = document.getElementById('speed-btn');
  if (btn) btn.textContent = listenSpeed + 'x';
  if (isPlaying) speakChunk(listenChunkIndex);
}

function seekProgress(e, bar) {
  const rect = bar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const targetIndex = Math.floor(ratio * listenTextChunks.length);
  speakChunk(Math.max(0, Math.min(targetIndex, listenTextChunks.length - 1)));
}

function updatePlayBtn() {
  const btn = document.getElementById('play-pause-btn');
  if (btn) btn.textContent = isPlaying ? '⏸' : '▶';
  renderListenBookList();
}

function updateListenDisplay(text, index) {
  const display = document.getElementById('listen-text-display');
  if (display) display.innerHTML = `<span class="highlight">${text}</span>`;
  const bar = document.getElementById('listen-progress-bar');
  if (bar) bar.style.width = Math.round((index / Math.max(listenTextChunks.length, 1)) * 100) + '%';
  const cur = document.getElementById('listen-current-chunk');
  if (cur) cur.textContent = (index + 1) + ' / ' + listenTextChunks.length;
}

// ===== Bookshelf =====
function switchShelfTab(tab, el) {

  document.querySelectorAll('.shelf-tab').forEach(t => t.classList.remove('active'));

    return;
  }
  container.innerHTML = `<div class="book-grid">${books.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const safeTitle = esc(book.title);
    const safeAuthor = esc(book.author.split('/')[0].trim());

    <div class="book-card" onclick="openDetail(${book.id})">
      <div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">

          <div class="cover-author">${safeAuthor}</div>

      </div>
      <div class="book-info">
        <div class="book-title">${safeTitle}</div>
        <div class="book-author">${safeAuthor}</div>
        <div class="book-rating">★ ${book.rating}</div>
      </div>

// ===== Search =====
function openSearch() {
  document.getElementById('search-bar').classList.add('active');
  document.getElementById('search-input').focus();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-search').classList.add('active');
  document.getElementById('search-results').innerHTML = '<div class="search-empty">输入关键词搜索书籍</div>';
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n, i) => { n.classList.toggle('active', i === 0); });
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('search-results');
  if (!q) { container.innerHTML = '<div class="search-empty">输入关键词搜索书籍</div>'; return; }
  const results = allBooks.filter(b =>
    b.title.toLowerCase().includes(q) ||
    b.author.toLowerCase().includes(q) ||
    b.tags.some(t => t.toLowerCase().includes(q)) ||
    b.summary.toLowerCase().includes(q) ||
    b.keyPoints.some(kp => kp.toLowerCase().includes(q))
  );
  if (!results.length) {
    const q2 = esc(query.trim());
    container.innerHTML = '<div class="search-empty"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="margin-bottom:6px">没有找到「' + q2 + '」</div><div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">想把这本书加入书库？</div><button class="submit-book-btn" onclick="openSubmitModal(\'' + q2 + '\')">+ 提交这本书</button></div>';
    return;
  }
  container.innerHTML = results.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const safeTitle = esc(book.title);
    return `
    <div class="search-result-item" onclick="openDetail(${book.id}); closeSearch()">
      <div class="search-thumb" style="background:linear-gradient(135deg,${c1},${c2})">
<img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${safeTitle}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"
onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
<span style="display:none">${emoji}</span>
</div>
<div class="search-info">
        <div class="search-title">${book.title}</div>
        <div class="search-author">${book.author} · ★${book.rating}</div>
        <div class="search-summary">${book.summary}</div>
      </div>
    </div>`;
  }).join('');
}

function saveShareCard() {
  const card = document.getElementById('share-card').firstElementChild;
  if (!card) return;
  if (typeof html2canvas === 'undefined') { showToast('图片生成功能需要网络支持'); return; }
  showToast('正在生成图片...');
  html2canvas(card, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = `${currentBook?.title || '书卡'}_周公解书.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('书卡已保存 🎉');
    closeShareModal();
  }).catch(() => showToast('生成失败，请重试'));
}

// ===== Toast =====

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}
