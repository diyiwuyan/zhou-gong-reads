// ===== HTML Escape =====
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ===== Cover Colors =====
const coverColors = [
  ['#1a1a3e','#2d1b69'], ['#1e3a2f','#0d5c3a'], ['#3a1a1a','#6b2020'],
  ['#1a2a3e','#1b4d6b'], ['#2a1a3e','#5c1b6b'], ['#3e2a1a','#6b4d1b'],
  ['#1a3e3a','#1b6b5c'], ['#3e1a2a','#6b1b4d']
];
function getCoverColor(id) { return coverColors[(id - 1) % coverColors.length]; }
function getCoverEmoji(cat) {
  const map = { mindset:'🧠', wealth:'💰', psychology:'🌱', leadership:'🏆', science:'🔭', philosophy:'☯️' };
  return map[cat] || '📖';
}

// ===== Render Categories =====
function renderCategories() {
  const container = document.getElementById('category-pills');
  let html = `<div class="cat-pill active" style="background:var(--accent);color:#fff" onclick="filterCat('all', this)">全部</div>`;
  allCategories.forEach(cat => {
    html += `<div class="cat-pill" style="--cat-color:${cat.color}" onclick="filterCat('${cat.id}', this)">${cat.icon} ${cat.name}</div>`;
  });
  container.innerHTML = html;

function filterCat(catId, el) {
  currentCat = catId;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = '';
  });
  el.classList.add('active');
  if (catId === 'all') {
    el.style.background = 'var(--accent)';
    el.style.color = '#fff';
  } else {
    const cat = allCategories.find(c => c.id === catId);
    if (cat) { el.style.background = cat.color; el.style.color = '#fff'; }
  }
  const filtered = catId === 'all' ? allBooks : allBooks.filter(b => b.category === catId);
  const catName = catId === 'all' ? '全部书籍' : allCategories.find(c => c.id === catId)?.name || '';
  document.getElementById('grid-title').textContent = catName;
  document.getElementById('grid-count').textContent = filtered.length + '本';
  renderBookGrid(filtered);
}

// ===== Render Book Grid =====
function renderBookGrid(books) {

    const emoji = getCoverEmoji(book.category);
    const read = isRead(book.id);
    const want = isWant(book.id);

    return `
    <div class="book-card" onclick="openDetail(${book.id})">
      <div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">

// ===== Listen =====
function openListenPage(bookId) {
  const book = allBooks.find(b => b.id === bookId);
  if (!book) return;
  startListening(book);
  // Switch to listen page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-listen').classList.add('active');
  document.querySelectorAll('.nav-item')[1].classList.add('active');
  prevPage = 'listen';
}

function buildListenText(book) {
  const lec = book.lecture;
  if (lec) {
    // 用讲书内容：更自然、更有深度
    const parts = [];
    // 开场白
    parts.push(`欢迎收听周公解读。今天为您带来《${book.title}》，作者${book.author}。`);
    // 精华解读（按句号分段，每段不超过120字）
    const essenceSentences = lec.essence
      .replace(/<[^>]+>/g, '')  // 去 HTML 标签
      .split(/[。！？]/)
      .filter(s => s.trim().length > 5);
    let chunk = '';
    for (const s of essenceSentences) {
      chunk += s + '。';
      if (chunk.length >= 80) { parts.push(chunk.trim()); chunk = ''; }
    }
    if (chunk.trim()) parts.push(chunk.trim());
    // 思维框架
    parts.push('下面为您介绍本书的核心思维框架。');
    lec.framework.forEach((f, i) => {
      const desc = f.desc.replace(/<[^>]+>/g, '');
      parts.push(`第${i+1}个框架：${f.label}。${desc}`);
    });
    // 行动清单
    parts.push('最后，是读完这本书后，您可以立刻付诸行动的清单。');
    lec.actions.forEach((a, i) => {
      const text = a.replace(/<[^>]+>/g, '');
      parts.push(`行动${i+1}：${text}`);
    });
    parts.push(`以上就是《${book.title}》的精华解读，感谢收听周公解读。`);
    return parts;
  }
  // 降级：用原始内容
  const parts = [
    `欢迎收听周公解读。今天为您带来《${book.title}》，作者${book.author}。`,
    `内容简介：${book.summary}`,
    `核心观点：`,
    ...book.keyPoints.map((kp, i) => `第${i+1}点：${kp}`),
    `经典金句：`,
    ...book.quotes,
    `以上就是《${book.title}》的精华解读，感谢收听周公解读。`
  ];
  return parts;
}

function startListening(book) {
  stopSpeech();
  listenBook = book;
  listenTextChunks = buildListenText(book);
  listenChunkIndex = 0;
  listenProgress = 0;
  renderListenPlayer(book);
  renderListenBookList();
}

function renderListenPage() {
  if (!listenBook && allBooks.length > 0) {
    listenBook = allBooks[0];
    listenTextChunks = buildListenText(listenBook);
    listenChunkIndex = 0;
  }
  if (listenBook) {
    renderListenPlayer(listenBook);
  }
  renderListenBookList();
}

function renderListenPlayer(book) {
  const [c1, c2] = getCoverColor(book.id);
  const emoji = getCoverEmoji(book.category);
  const totalChunks = buildListenText(book).length;
  const progress = listenBook?.id === book.id ? Math.round((listenChunkIndex / Math.max(totalChunks, 1)) * 100) : 0;
  const currentText = listenBook?.id === book.id && listenTextChunks[listenChunkIndex] ? listenTextChunks[listenChunkIndex] : (buildListenText(book)[0] || '');

  document.getElementById('listen-player').innerHTML = `
  <div class="listen-hero">
    <div class="listen-cover" style="background:linear-gradient(135deg,${c1},${c2})">
      <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;text-align:center;padding:8px;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%">
        <div style="font-size:36px">${emoji}</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.6);margin-top:4px">${book.title}</div>
      </div>
    </div>
    <div class="listen-title">${book.title}</div>
    <div class="listen-author">${book.author}</div>
  </div>
  <div class="listen-progress">
    <div class="progress-bar-wrap" onclick="seekProgress(event, this)">
      <div class="progress-bar-fill" id="listen-progress-bar" style="width:${progress}%"></div>
    </div>
    <div class="progress-times">
      <span id="listen-current-chunk">${listenChunkIndex + 1} / ${totalChunks}</span>
      <span id="listen-total-chunks">${totalChunks} 段</span>
    </div>
  </div>
  <div class="listen-controls">
    <button class="ctrl-btn" onclick="prevChunk()" title="上一段">⏮</button>
    <button class="ctrl-btn play-btn" id="play-pause-btn" onclick="togglePlay()">${isPlaying && listenBook?.id === book.id ? '⏸' : '▶'}</button>
    <button class="ctrl-btn" onclick="nextChunk()" title="下一段">⏭</button>
    <button class="speed-btn" onclick="cycleSpeed()" id="speed-btn">${listenSpeed}x</button>
  </div>
  <div class="listen-text-area">
    <div class="listen-text" id="listen-text-display">${currentText}</div>
  </div>
  `;
}

function renderListenBookList() {
  const container = document.getElementById('listen-book-list');
  if (!container || !allBooks.length) return;
  container.innerHTML = allBooks.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const active = listenBook?.id === book.id;
    const chunks = buildListenText(book).length;
    return `
    <div class="listen-book-item ${active ? 'active' : ''}" onclick="startListening(allBooks.find(b=>b.id===${book.id}))">
      <div class="listen-book-thumb" style="background:linear-gradient(135deg,${c1},${c2})">
        <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span style="display:none">${emoji}</span>
      </div>
      <div class="listen-book-info">
        <div class="listen-book-name">${book.title}</div>
        <div class="listen-book-author">${book.author.split('/')[0].trim()}</div>
        <div class="listen-book-duration">约 ${chunks} 段内容</div>
      </div>
      <div class="listen-play-icon">${active && isPlaying ? '🔊' : '▶'}</div>
    </div>`;
  }).join('');
}

function togglePlay() {
  if (!listenBook) return;
  if (isPlaying) {
    pauseSpeech();
  } else {
    playSpeech();
  }
}

function playSpeech() {
  if (!listenBook || !listenTextChunks.length) return;
  if (speechSynth.paused) {
    speechSynth.resume();
    isPlaying = true;
    updatePlayBtn();
    return;
  }
  speakChunk(listenChunkIndex);
}

function speakChunk(index) {
  if (index >= listenTextChunks.length) {
    isPlaying = false;
    updatePlayBtn();
    showToast('🎉 朗读完毕！');
    return;
  }
  stopSpeech();
  listenChunkIndex = index;
  const text = listenTextChunks[index];
  updateListenDisplay(text, index);

  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'zh-CN';
  currentUtterance.rate = listenSpeed * 0.92; // 稍慢更自然
  currentUtterance.pitch = 1.05;
  currentUtterance.volume = 1.0;

  // 优先选高质量中文声音（微软 Xiaoxiao > 其他神经网络声音 > 本地声音）
  const voices = speechSynth.getVoices();
  const preferredNames = ['Microsoft Xiaoxiao', 'Microsoft Yunxi', 'Microsoft Xiaoyi', 'Tingting', 'Meijia'];
  let zhVoice = null;
  for (const name of preferredNames) {
    zhVoice = voices.find(v => v.name.includes(name));
    if (zhVoice) break;
  }
  if (!zhVoice) zhVoice = voices.find(v => v.lang === 'zh-CN' && !v.localService)
                          || voices.find(v => v.lang === 'zh-CN')
                          || voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) currentUtterance.voice = zhVoice;

  currentUtterance.onend = () => {
    if (isPlaying) speakChunk(index + 1);
  };
  currentUtterance.onerror = (e) => {
    if (e.error !== 'interrupted') { isPlaying = false; updatePlayBtn(); }
  };

  isPlaying = true;
  updatePlayBtn();
  speechSynth.speak(currentUtterance);
}

function pauseSpeech() {
  speechSynth.pause();
  isPlaying = false;
  updatePlayBtn();
}

function stopSpeech() {
  speechSynth.cancel();
  isPlaying = false;
}

function prevChunk() {
  if (listenChunkIndex > 0) speakChunk(listenChunkIndex - 1);
}

function nextChunk() {
  if (listenChunkIndex < listenTextChunks.length - 1) speakChunk(listenChunkIndex + 1);
}

function cycleSpeed() {
  const speeds = [0.75, 1.0, 1.25, 1.5, 2.0];
  const idx = speeds.indexOf(listenSpeed);
  listenSpeed = speeds[(idx + 1) % speeds.length];
  const btn = document.getElementById('speed-btn');
  if (btn) btn.textContent = listenSpeed + 'x';
  if (isPlaying) speakChunk(listenChunkIndex);
}

function seekProgress(e, bar) {
  const rect = bar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const targetIndex = Math.floor(ratio * listenTextChunks.length);
  speakChunk(Math.max(0, Math.min(targetIndex, listenTextChunks.length - 1)));
}

function updatePlayBtn() {
  const btn = document.getElementById('play-pause-btn');
  if (btn) btn.textContent = isPlaying ? '⏸' : '▶';
  renderListenBookList();
}

function updateListenDisplay(text, index) {
  const display = document.getElementById('listen-text-display');
  if (display) display.innerHTML = `<span class="highlight">${text}</span>`;
  const bar = document.getElementById('listen-progress-bar');
  if (bar) bar.style.width = Math.round((index / Math.max(listenTextChunks.length, 1)) * 100) + '%';
  const cur = document.getElementById('listen-current-chunk');
  if (cur) cur.textContent = (index + 1) + ' / ' + listenTextChunks.length;
}

// ===== Bookshelf =====
function switchShelfTab(tab, el) {
  currentShelfTab = tab;
  document.querySelectorAll('.shelf-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderShelf(tab);
}

function renderShelf(tab) {
  const list = tab === 'read' ? getReadList() : getWantList();
  const books = allBooks.filter(b => list.includes(b.id));
  const container = document.getElementById('shelf-content');
  if (!books.length) {
    container.innerHTML = `<div class="empty-shelf"><div class="empty-icon">${tab === 'read' ? '📖' : '🔖'}</div><p>${tab === 'read' ? '还没有已读书籍\n去书城标记你读过的书吧' : '还没有想读书籍\n去书城收藏你感兴趣的书吧'}</p></div>`;
    return;
  }
  container.innerHTML = `<div class="book-grid">${books.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const safeTitle = esc(book.title);
    const safeAuthor = esc(book.author.split('/')[0].trim());
    return `
    <div class="book-card" onclick="openDetail(${book.id})">
      <div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">
        <img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${safeTitle}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="cover-fallback" style="display:none">
          <span style="font-size:28px">${emoji}</span>
          <div class="cover-title">${safeTitle}</div>
          <div class="cover-author">${safeAuthor}</div>
        </div>
      </div>
      <div class="book-info">
        <div class="book-title">${safeTitle}</div>
        <div class="book-author">${safeAuthor}</div>
        <div class="book-rating">★ ${book.rating}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ===== Search =====
function openSearch() {
  document.getElementById('search-bar').classList.add('active');
  document.getElementById('search-input').focus();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-search').classList.add('active');
  document.getElementById('search-results').innerHTML = '<div class="search-empty">输入关键词搜索书籍</div>';
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n, i) => { n.classList.toggle('active', i === 0); });
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('search-results');
  if (!q) { container.innerHTML = '<div class="search-empty">输入关键词搜索书籍</div>'; return; }
  const results = allBooks.filter(b =>
    b.title.toLowerCase().includes(q) ||
    b.author.toLowerCase().includes(q) ||
    b.tags.some(t => t.toLowerCase().includes(q)) ||
    b.summary.toLowerCase().includes(q) ||
    b.keyPoints.some(kp => kp.toLowerCase().includes(q))
  );
  if (!results.length) {
    const q2 = esc(query.trim());
    container.innerHTML = '<div class="search-empty"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="margin-bottom:6px">没有找到「' + q2 + '」</div><div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">想把这本书加入书库？</div><button class="submit-book-btn" onclick="openSubmitModal(\'' + q2 + '\')">+ 提交这本书</button></div>';
    return;
  }
  container.innerHTML = results.map(book => {
    const [c1, c2] = getCoverColor(book.id);
    const emoji = getCoverEmoji(book.category);
    const safeTitle = esc(book.title);
    return `
    <div class="search-result-item" onclick="openDetail(${book.id}); closeSearch()">
      <div class="search-thumb" style="background:linear-gradient(135deg,${c1},${c2})">
<img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${safeTitle}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"
onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
<span style="display:none">${emoji}</span>
</div>
<div class="search-info">
        <div class="search-title">${book.title}</div>
        <div class="search-author">${book.author} · ★${book.rating}</div>
        <div class="search-summary">${book.summary}</div>
      </div>
    </div>`;
  }).join('');
}

// ===== Share =====
function openShareModal() {
  if (!currentBook) return;
  const book = currentBook;
  const [c1, c2] = getCoverColor(book.id);
  const emoji = getCoverEmoji(book.category);
  const quote = book.quotes[0] || '';
  document.getElementById('share-card').innerHTML = `
  <div style="background:linear-gradient(135deg,${c1} 0%,${c2} 100%);border-radius:var(--radius);padding:20px">
    <div class="share-card-header">
      <div class="share-card-cover" style="background:linear-gradient(135deg,${c1},${c2});border:2px solid rgba(255,255,255,0.2)">
<img src="${getBookCoverUrl(book.id) || 'assets/covers/' + book.cover}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover"
onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
<span style="display:none;font-size:28px">${emoji}</span>
      </div>
      <div class="share-card-meta">
        <div class="share-card-title">${book.title}</div>
        <div class="share-card-author">${book.author}</div>
        <div class="share-card-rating">★ ${book.rating} 豆瓣</div>
      </div>
    </div>
    <div class="share-card-quote">${quote}</div>
    <div class="share-card-footer">
      <div class="share-card-app">来自 周公解读</div>
      <div class="share-card-logo">周公解读</div>
    </div>
  </div>`;
  document.getElementById('share-modal').classList.add('active');
}

function closeShareModal(e) {
  if (!e || e.target === document.getElementById('share-modal')) {
    document.getElementById('share-modal').classList.remove('active');
  }
}

function saveShareCard() {
  const card = document.getElementById('share-card').firstElementChild;
  if (!card) return;
  if (typeof html2canvas === 'undefined') { showToast('图片生成功能需要网络支持'); return; }
  showToast('正在生成图片...');
  html2canvas(card, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = `${currentBook?.title || '书卡'}_周公解读.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('书卡已保存 🎉');
    closeShareModal();
  }).catch(() => showToast('生成失败，请重试'));
}

// ===== Toast =====
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== Start =====
// 预加载语音列表（部分浏览器需要触发一次才能获取）
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// ===== Service Worker =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/zhou-gong-reads/sw.js').catch(() => {});
  });
}
