<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="周公解读">
  <title>周公解读</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1e2a4a;
      --accent: #6C63FF;
      --accent-light: #8b85ff;
      --text-primary: #f0f0f5;
      --text-secondary: #9090b0;
      --text-muted: #5a5a7a;
      --border: rgba(108, 99, 255, 0.2);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 16px;
      --radius-sm: 10px;
      --nav-height: 64px;
      --header-height: 56px;
    }

    /* ===== Reset & Base ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
    
    /* ===== App Shell ===== */
    #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* ===== Header ===== */
    #header {
      height: var(--header-height);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    #header .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #6C63FF, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
    #header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    #header .header-right { margin-left: auto; display: flex; gap: 8px; }
    #header .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(108,99,255,0.1); border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
    #header .icon-btn:hover { background: rgba(108,99,255,0.25); color: var(--accent-light); }
    #search-bar { display: none; position: absolute; left: 0; right: 0; top: 0; height: var(--header-height); background: var(--bg-secondary); padding: 0 16px; align-items: center; gap: 10px; z-index: 20; }
    #search-bar.active { display: flex; }
    #search-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; color: var(--text-primary); font-size: 15px; outline: none; }
    #search-input::placeholder { color: var(--text-muted); }
    #search-cancel { color: var(--accent-light); font-size: 14px; cursor: pointer; white-space: nowrap; }

    /* ===== Main Content ===== */
    #main { flex: 1; overflow: hidden; position: relative; }
    .page { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; display: none; }
    .page.active { display: block; }
    .page-content { padding: 16px 16px calc(var(--nav-height) + 16px); }

    /* ===== Bottom Nav ===== */
    #bottom-nav {
      height: var(--nav-height);
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: all 0.2s; color: var(--text-muted); border: none; background: none; }
    .nav-item .nav-icon { font-size: 22px; transition: transform 0.2s; }
    .nav-item .nav-label { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--accent-light); }
    .nav-item.active .nav-icon { transform: scale(1.15); }

    /* ===== Home Page ===== */
    .banner {
      background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 50%, #1a1a3e 100%);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .banner::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(108,99,255,0.3) 0%, transparent 70%); }
    .banner-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .banner-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .banner-stats { display: flex; gap: 20px; margin-top: 14px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--accent-light); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title .badge { font-size: 11px; background: rgba(108,99,255,0.2); color: var(--accent-light); padding: 2px 8px; border-radius: 10px; font-weight: 500; }

    /* Category Pills */
    .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none; }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s; background: var(--bg-card); color: var(--text-secondary); }
    .cat-pill.active { color: #fff; border-color: transparent; }

    /* Book Grid */
    .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .book-card { background: var(--bg-card); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
    .book-card:active { transform: scale(0.96); }
    .book-cover { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1e2a4a, #2d1b69); display: flex; align-items: center; justify-content: center; font-size: 32px; position: relative; overflow: hidden; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .book-cover .cover-fallback { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px; text-align: center; }
    .book-cover .cover-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); line-height: 1.3; }
    .book-cover .cover-author { font-size: 9px; color: rgba(255,255,255,0.5); }
    .book-info { padding: 8px; }
    .book-title { font-size: 12px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .book-author { font-size: 10px; color: var(--text-muted); }
    .book-rating { font-size: 10px; color: #f7b731; margin-top: 2px; }
    .read-badge { position: absolute; top: 6px; right: 6px; background: rgba(38, 222, 129, 0.9); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: 600; }
    .want-badge { position: absolute; top: 6px; right: 6px; background: rgba(108, 99, 255, 0.9); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: 600; }

    /* ===== Detail Page ===== */
    #detail-page { background: var(--bg-primary); }
    .detail-header { position: sticky; top: 0; z-index: 10; background: rgba(15,15,26,0.95); backdrop-filter: blur(10px); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .detail-header-title { font-size: 16px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .detail-hero { padding: 24px 16px; display: flex; gap: 16px; background: linear-gradient(180deg, #1a1a3e 0%, var(--bg-primary) 100%); }
    .detail-cover { width: 100px; height: 150px; border-radius: 10px; overflow: hidden; flex-shrink: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); background: linear-gradient(135deg, #1e2a4a, #2d1b69); display: flex; align-items: center; justify-content: center; }
    .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
    .detail-meta { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
    .detail-title { font-size: 20px; font-weight: 800; line-height: 1.3; }
    .detail-author { font-size: 14px; color: var(--text-secondary); }
    .detail-ratings { display: flex; gap: 12px; margin-top: 4px; }
    .rating-item { text-align: center; }
    .rating-score { font-size: 20px; font-weight: 800; color: #f7b731; }
    .rating-label { font-size: 10px; color: var(--text-muted); }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: rgba(108,99,255,0.15); color: var(--accent-light); border: 1px solid rgba(108,99,255,0.3); }

    .detail-actions { display: flex; gap: 10px; padding: 0 16px 16px; }
    .action-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .action-btn.primary { background: var(--accent); color: #fff; }
    .action-btn.primary:hover { background: var(--accent-light); }
    .action-btn.secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
    .action-btn.secondary.active { background: rgba(38,222,129,0.15); color: #26de81; border-color: rgba(38,222,129,0.4); }
    .action-btn.want-btn.active { background: rgba(108,99,255,0.15); color: var(--accent-light); border-color: rgba(108,99,255,0.4); }

    .detail-section { padding: 0 16px 20px; }
    .detail-section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .detail-section-title .icon { font-size: 18px; }
    .summary-text { font-size: 14px; line-height: 1.8; color: var(--text-secondary); }
    
    .outline-list { list-style: none; }
    .outline-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .outline-item:last-child { border-bottom: none; }
    .outline-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(108,99,255,0.2); color: var(--accent-light); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .outline-text { font-size: 13px; line-height: 1.5; color: var(--text-secondary); }

    .keypoint-list { display: flex; flex-direction: column; gap: 10px; }
    .keypoint-item { background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px; border-left: 3px solid var(--accent); font-size: 13px; line-height: 1.6; color: var(--text-secondary); }

    .quote-list { display: flex; flex-direction: column; gap: 12px; }
    .quote-item { background: var(--bg-card); border-radius: var(--radius-sm); padding: 14px; position: relative; }
    .quote-item::before { content: '"'; position: absolute; top: 8px; left: 12px; font-size: 36px; color: rgba(108,99,255,0.3); line-height: 1; font-family: Georgia, serif; }
    .quote-text { font-size: 14px; line-height: 1.7; color: var(--text-primary); padding-left: 20px; font-style: italic; }

    /* ===== Listen Page ===== */
    .listen-hero { background: linear-gradient(135deg, #1a1a3e, #2d1b69); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; text-align: center; }
    .listen-cover { width: 100px; height: 150px; border-radius: 10px; margin: 0 auto 16px; overflow: hidden; background: var(--bg-card); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .listen-cover img { width: 100%; height: 100%; object-fit: cover; }
    .listen-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .listen-author { font-size: 13px; color: var(--text-secondary); }
    
    .listen-progress { padding: 0 16px; margin-bottom: 20px; }
    .progress-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 12px 0 6px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
    .progress-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
    
    .listen-controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 20px; }
    .ctrl-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 28px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .ctrl-btn:hover { color: var(--text-primary); transform: scale(1.1); }
    .ctrl-btn.play-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 26px; box-shadow: 0 4px 20px rgba(108,99,255,0.5); }
    .ctrl-btn.play-btn:hover { background: var(--accent-light); transform: scale(1.05); }
    .speed-btn { background: rgba(108,99,255,0.15); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; color: var(--accent-light); font-size: 13px; font-weight: 600; cursor: pointer; }

    .listen-text-area { background: var(--bg-card); border-radius: var(--radius); padding: 16px; margin: 0 0 16px; max-height: 200px; overflow-y: auto; }
    .listen-text { font-size: 14px; line-height: 1.9; color: var(--text-secondary); }
    .listen-text .highlight { color: var(--text-primary); background: rgba(108,99,255,0.2); border-radius: 3px; padding: 0 2px; }

    .listen-book-list { display: flex; flex-direction: column; gap: 10px; }
    .listen-book-item { display: flex; gap: 12px; align-items: center; background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: background 0.2s; }
    .listen-book-item:hover { background: var(--bg-card-hover); }
    .listen-book-item.active { border: 1px solid var(--accent); background: rgba(108,99,255,0.1); }
    .listen-book-thumb { width: 44px; height: 66px; border-radius: 6px; overflow: hidden; background: var(--bg-secondary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .listen-book-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .listen-book-info { flex: 1; }
    .listen-book-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .listen-book-author { font-size: 12px; color: var(--text-muted); }
    .listen-book-duration { font-size: 11px; color: var(--accent-light); margin-top: 3px; }
    .listen-play-icon { font-size: 20px; color: var(--text-muted); }
    .listen-book-item.active .listen-play-icon { color: var(--accent-light); }

    /* ===== Bookshelf Page ===== */
    .shelf-tabs { display: flex; gap: 0; margin-bottom: 16px; background: var(--bg-card); border-radius: var(--radius-sm); padding: 4px; }
    .shelf-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 8px; color: var(--text-muted); transition: all 0.2s; }
    .shelf-tab.active { background: var(--accent); color: #fff; }
    .empty-shelf { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-shelf .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-shelf p { font-size: 14px; line-height: 1.6; }

    /* ===== Search Results ===== */
    .search-results { padding: 16px; }
    .search-result-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .search-result-item:last-child { border-bottom: none; }
    .search-thumb { width: 50px; height: 75px; border-radius: 6px; overflow: hidden; background: var(--bg-card); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .search-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .search-info { flex: 1; }
    .search-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .search-author { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .search-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .search-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

    /* ===== Share Card Modal ===== */
    #share-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); align-items: flex-end; justify-content: center; }
    #share-modal.active { display: flex; }
    .share-sheet { background: var(--bg-secondary); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; }
    .share-sheet-title { text-align: center; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    #share-card { background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .share-card-header { display: flex; gap: 14px; margin-bottom: 16px; }
    .share-card-cover { width: 70px; height: 105px; border-radius: 8px; overflow: hidden; background: var(--bg-card); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .share-card-cover img { width: 100%; height: 100%; object-fit: cover; }
    .share-card-meta { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
    .share-card-title { font-size: 18px; font-weight: 800; }
    .share-card-author { font-size: 13px; color: rgba(255,255,255,0.6); }
    .share-card-rating { font-size: 16px; color: #f7b731; font-weight: 700; }
    .share-card-quote { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.8); font-style: italic; border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 14px; }
    .share-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .share-card-app { font-size: 12px; color: rgba(255,255,255,0.4); }
    .share-card-logo { font-size: 14px; font-weight: 800; background: linear-gradient(135deg, #6C63FF, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .share-actions { display: flex; gap: 10px; }
    .share-action-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .share-action-btn.save { background: var(--accent); color: #fff; }
    .share-action-btn.cancel { background: var(--bg-card); color: var(--text-primary); }

    /* ===== Toast ===== */
    #toast { position: fixed; bottom: calc(var(--nav-height) + 20px); left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,30,50,0.95); color: var(--text-primary); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 200; white-space: nowrap; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== Detail Tabs ===== */
    .detail-tabs { display: flex; gap: 0; margin: 0 16px 0; background: var(--bg-card); border-radius: var(--radius-sm); padding: 4px; }
    .detail-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 8px; color: var(--text-muted); transition: all 0.2s; }
    .detail-tab.active { background: var(--accent); color: #fff; }
    .detail-tab-content { display: none; }
    .detail-tab-content.active { display: block; }

    /* ===== Lecture Styles ===== */
    .lecture-section { padding: 16px 16px 8px; }
    .lecture-section-title { font-size: 14px; font-weight: 700; color: var(--accent-light); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .lecture-body { font-size: 14px; line-height: 1.9; color: var(--text-secondary); margin-bottom: 16px; }
    .lecture-framework { background: var(--bg-card); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 16px; }
    .framework-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .framework-item:last-child { border-bottom: none; }
    .framework-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
    .framework-text { flex: 1; }
    .framework-label { font-size: 12px; font-weight: 700; color: var(--accent-light); margin-bottom: 3px; }
    .framework-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .action-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .action-item { display: flex; gap: 10px; align-items: flex-start; background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px; }
    .action-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .action-text { font-size: 13px; line-height: 1.6; color: var(--text-secondary); flex: 1; }
    .action-text strong { color: var(--text-primary); }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.3); border-radius: 2px; }

    /* ===== Animations ===== */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

<script>
// ===== State =====
let allBooks = [];
let allCategories = [];
let currentBook = null;
let currentCat = 'all';
let prevPage = 'home';
let currentShelfTab = 'read';
let speechSynth = window.speechSynthesis;
let lastBookId = null;       // 上次学习的书籍 ID
let newBadgeIds = [];        // 新解锁的勋章（用于红点提示）

// ===== Supabase =====
const SUPA_URL = 'https://kskopljhykybcgoacbzm.supabase.co';
const SUPA_KEY = 'sb_publishable_6SpRwJjelt-YXKg-DMR6wg_7qzL1p1u';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ===== Auth State =====
let currentUser = null;
let userProfile = null; // { nickname }

// ===== Auth Module =====
async function initAuth() {
  const { data: { session } } = await supa.auth.getSession();
  currentUser = session?.user || null;
  updateAuthUI();
  if (currentUser) { await loadUserProfile(); await syncProgressFromCloud(); }
  supa.auth.onAuthStateChange(async (_event, session) => {
    currentUser = session?.user || null;
    updateAuthUI();
    if (currentUser) { await loadUserProfile(); await syncProgressFromCloud(); }
    else { userProfile = null; renderShelf(currentShelfTab); }
  });
}

async function loadUserProfile() {
  if (!currentUser) return;
  const { data } = await supa.from('profiles').select('nickname,last_book_id').eq('id', currentUser.id).single();
  userProfile = data || null;
  if (data && data.last_book_id) {
    lastBookId = data.last_book_id;
    localStorage.setItem('zg_last_book', String(data.last_book_id));
  } else {
    const local = localStorage.getItem('zg_last_book');
    if (local) lastBookId = parseInt(local);
  }
  updateAuthUI();
  renderContinueReading();
}

async function saveNickname(nick) {
  if (!currentUser) return;
  nick = nick.trim();
  if (!nick) return;
  await supa.from('profiles').upsert({ id: currentUser.id, nickname: nick, updated_at: new Date().toISOString() });
  userProfile = { nickname: nick };
  updateAuthUI();
  document.getElementById('profile-nick').textContent = nick;
  document.getElementById('profile-nick-input').value = nick;
  showToast('昵称已保存 ✓');
}

function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  if (!btn) return;
  if (currentUser) {
    const nick = (userProfile && userProfile.nickname) ? userProfile.nickname : currentUser.email.split('@')[0];
    btn.innerHTML = '<span style="font-size:13px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + nick + '</span>';
  } else {
    btn.innerHTML = '👤';
  }
  updateBannerStats();
}

function openAuthModal() {
  if (currentUser) { openProfileModal(); return; }
  document.getElementById('auth-modal').classList.add('active');
  switchAuthTab('login');
}
function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('active');
  document.getElementById('auth-error').textContent = '';
}
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('auth-tab-' + tab).classList.add('active');
  document.getElementById('auth-form-login').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('auth-form-register').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('auth-error').textContent = '';
}
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { document.getElementById('auth-error').textContent = '请填写邮箱和密码'; return; }
  const btn = document.getElementById('login-submit');
  btn.disabled = true; btn.textContent = '登录中...';
  const { error } = await supa.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = '登录';
  if (error) { document.getElementById('auth-error').textContent = error.message === 'Invalid login credentials' ? '邮箱或密码错误' : error.message; return; }
  closeAuthModal(); showToast('登录成功 🎉');
}
async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  if (!email || !pass) { document.getElementById('auth-error').textContent = '请填写邮箱和密码'; return; }
  if (pass.length < 6) { document.getElementById('auth-error').textContent = '密码至少6位'; return; }
  if (pass !== pass2) { document.getElementById('auth-error').textContent = '两次密码不一致'; return; }
  const btn = document.getElementById('reg-submit');
  btn.disabled = true; btn.textContent = '注册中...';
  const { error } = await supa.auth.signUp({ email, password: pass });
  btn.disabled = false; btn.textContent = '注册';
  if (error) { document.getElementById('auth-error').textContent = error.message.includes('already') ? '该邮箱已注册' : error.message; return; }
  closeAuthModal(); showToast('注册成功！🎉');
}
async function doLogout() {
  await supa.auth.signOut(); closeProfileModal(); showToast('已退出登录');
}
function openProfileModal() {
  if (!currentUser) return;
  const nick = (userProfile && userProfile.nickname) ? userProfile.nickname : currentUser.email.split('@')[0];
  document.getElementById('profile-nick').textContent = nick;
  document.getElementById('profile-nick-input').value = nick;
  document.getElementById('profile-email').textContent = currentUser.email;
  document.getElementById('profile-read-count').textContent = getReadList().length;
  document.getElementById('profile-want-count').textContent = getWantList().length;
  document.getElementById('profile-modal').classList.add('active');
}
function closeProfileModal() { document.getElementById('profile-modal').classList.remove('active'); }

function openSubmitModal(prefillTitle) {
  if (!currentUser) { showToast('请先登录后再提交 👤'); setTimeout(() => openAuthModal(), 800); return; }
  document.getElementById('submit-title').value = prefillTitle || '';
  document.getElementById('submit-author').value = '';
  document.getElementById('submit-reason').value = '';
  document.getElementById('submit-error').textContent = '';
  document.getElementById('submit-modal').classList.add('active');
}
function closeSubmitModal() { document.getElementById('submit-modal').classList.remove('active'); }
async function doSubmitBook() {
  const title = document.getElementById('submit-title').value.trim();
  const author = document.getElementById('submit-author').value.trim();
  const reason = document.getElementById('submit-reason').value.trim();
  if (!title) { document.getElementById('submit-error').textContent = '请填写书名'; return; }
  const btn = document.getElementById('submit-book-btn');
  btn.disabled = true; btn.textContent = '提交中...';
  const { data: existing } = await supa.from('book_requests').select('id,votes').ilike('title', title).eq('status', 'pending').limit(1);
  if (existing && existing.length > 0) {
    const req = existing[0];
    const { error: ve } = await supa.from('book_request_votes').insert({ user_id: currentUser.id, request_id: req.id });
    btn.disabled = false; btn.textContent = '提交';
    if (!ve) { await supa.from('book_requests').update({ votes: req.votes + 1 }).eq('id', req.id); closeSubmitModal(); showToast('已为这本书 +1 票 👍'); return; }
    document.getElementById('submit-error').textContent = '你已经提交过这本书了'; return;
  }
  const { error } = await supa.from('book_requests').insert({ user_id: currentUser.id, title, author: author || null, reason: reason || null });
  btn.disabled = false; btn.textContent = '提交';
  if (error) { document.getElementById('submit-error').textContent = '提交失败，请重试'; return; }
  closeSubmitModal(); showToast('提交成功！我们会尽快审核 🎉');
}
